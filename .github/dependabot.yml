version: 2
updates:
  # Python dependencies (pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Let a new release settle before we bump to it, so we don't chase
    # immediately-yanked or regression releases.
    cooldown:
      default-days: 7
    groups:
      # One PR per week with all minor/patch production deps bumped together.
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      # One PR per week with all minor/patch dev-only deps bumped together.
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # Major bumps still get individual PRs so they can be reviewed carefully.

  # GitHub Actions workflow versions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
