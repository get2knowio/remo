name: Smoke Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/remo_cli/**'
      - 'ansible/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/smoke-test.yml'
  push:
    branches: [main]
    paths:
      - 'src/remo_cli/**'
      - 'ansible/**'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  workflow_dispatch:
    inputs:
      provider:
        description: 'Provider to test'
        type: choice
        default: 'all'
        options: [all, aws, hetzner, incus]

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: false  # Never cancel — would orphan cloud resources

jobs:
  # ===========================================================================
  # AWS EC2 — SSM access
  # ===========================================================================
  aws:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'workflow_dispatch' ||
       github.event.inputs.provider == 'all' ||
       github.event.inputs.provider == 'aws')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    timeout-minutes: 20
    env:
      INSTANCE_NAME: ci-${{ github.run_id }}-aws

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install remo
        run: uv sync

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          role-session-name: remo-ci-${{ github.run_id }}
          aws-region: us-west-2

      - name: Install SSM plugin
        run: |
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" \
            -o /tmp/ssm-plugin.deb
          sudo dpkg -i /tmp/ssm-plugin.deb

      - name: Write SSH keys from secrets
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub

      - name: Provision
        run: uv run remo aws create --name "$INSTANCE_NAME"

      - name: Test SSM connectivity
        run: |
          ENTRY=$(grep "^aws:${INSTANCE_NAME}:" ~/.config/remo/known_hosts | tail -1)
          USER=$(echo "$ENTRY" | cut -d: -f4)
          INSTANCE_ID=$(echo "$ENTRY" | cut -d: -f5)
          REGION=$(echo "$ENTRY" | cut -d: -f7)
          REGION="${REGION:-us-west-2}"

          # Wait for SSM to report the instance as connected. The provision
          # playbook polls PingStatus during create, but the agent can flap
          # back to "not connected" briefly afterwards, so re-confirm here
          # before attempting SSH-via-SSM.
          for attempt in $(seq 1 24); do
            STATUS=$(aws ssm describe-instance-information \
              --region "$REGION" \
              --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
              --query 'InstanceInformationList[0].PingStatus' \
              --output text 2>/dev/null || echo "")
            if [ "$STATUS" = "Online" ]; then
              echo "SSM PingStatus: Online (after ${attempt} polls)"
              break
            fi
            echo "SSM PingStatus: ${STATUS:-unknown} (attempt $attempt/24)"
            sleep 5
          done

          echo "Testing SSH via SSM to $USER@$INSTANCE_ID..."
          # The provision playbook ends with a reboot when kernel updates were
          # applied; the SSM agent reports Online again quickly via heartbeat,
          # but its session-handler can take 3-5 minutes to accept fresh
          # start-session calls. Retry generously to cover that window.
          for attempt in $(seq 1 18); do
            if ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
                -o ConnectTimeout=60 \
                -o "ProxyCommand=aws ssm start-session --region ${REGION} --target %h --document-name AWS-StartSSHSession --parameters 'portNumber=%p'" \
                -i ~/.ssh/id_rsa \
                "$USER@$INSTANCE_ID" echo "connection-ok" | grep -q "connection-ok"; then
              echo "SSM connectivity: PASS (attempt $attempt)"
              exit 0
            fi
            echo "Attempt $attempt failed; sleeping 20s before retry..."
            sleep 20
          done
          echo "SSM connectivity: FAIL after 18 attempts (~6 minutes)"
          exit 1

      - name: Test info command
        run: |
          OUT=$(uv run remo aws info --name "$INSTANCE_NAME")
          echo "$OUT"
          echo "$OUT" | grep -q "Instance ID:" || { echo "FAIL: missing Instance ID"; exit 1; }
          echo "$OUT" | grep -q "State:"       || { echo "FAIL: missing State"; exit 1; }
          echo "$OUT" | grep -q "Type:"        || { echo "FAIL: missing Type"; exit 1; }
          echo "$OUT" | grep -q "Cores:"       || { echo "FAIL: missing Cores"; exit 1; }
          echo "$OUT" | grep -q "Memory:"      || { echo "FAIL: missing Memory"; exit 1; }
          echo "$OUT" | grep -q "EBS volume:"  || { echo "FAIL: missing EBS volume"; exit 1; }
          echo "aws info: PASS"

      - name: Snapshot — create (async kickoff)
        run: |
          SNAP=ci-smoke-aws
          echo "SNAP_NAME=$SNAP" >> "$GITHUB_ENV"
          OUT=$(uv run remo aws snapshot create "$INSTANCE_NAME" --name "$SNAP" --description "smoke test")
          echo "$OUT"
          echo "$OUT" | grep -q "creation started" || { echo "FAIL: missing async-create hint"; exit 1; }
          echo "$OUT" | grep -q "several minutes" || { echo "FAIL: missing duration hint"; exit 1; }
          echo "aws snapshot create: PASS"

      - name: Snapshot — list shows pending then available
        run: |
          # Initial list: pending (or already available if AWS is fast today)
          uv run remo aws snapshot list "$INSTANCE_NAME" | tee /tmp/list-1.txt
          grep -q "$SNAP_NAME" /tmp/list-1.txt || { echo "FAIL: snapshot missing from initial list"; exit 1; }
          grep -q "STATUS" /tmp/list-1.txt || { echo "FAIL: AWS list missing STATUS column"; exit 1; }

          # Poll up to 10 minutes for the snapshot to reach available state
          for attempt in $(seq 1 60); do
            OUT=$(uv run remo aws snapshot list "$INSTANCE_NAME")
            if echo "$OUT" | grep -E "^\s*$INSTANCE_NAME\s+$SNAP_NAME\s.*\savailable" >/dev/null; then
              echo "Snapshot $SNAP_NAME is available (attempt $attempt)"
              break
            fi
            echo "Attempt $attempt: not yet available; sleeping 10s..."
            sleep 10
          done
          uv run remo aws snapshot list "$INSTANCE_NAME" | grep -E "^\s*$INSTANCE_NAME\s+$SNAP_NAME\s.*\savailable" \
            || { echo "FAIL: snapshot did not reach available within 10 min"; exit 1; }
          echo "aws snapshot list: PASS"

      - name: Snapshot — delete
        run: |
          uv run remo aws snapshot delete "$INSTANCE_NAME" "$SNAP_NAME" --yes
          # Verify it's gone from list
          OUT=$(uv run remo aws snapshot list "$INSTANCE_NAME")
          if echo "$OUT" | grep -q "$SNAP_NAME"; then
            echo "FAIL: snapshot still present after delete"; exit 1
          fi
          echo "aws snapshot delete: PASS"

      - name: Teardown
        if: always()
        run: |
          # Best-effort cleanup of any leftover smoke snapshots (in case of
          # mid-step failure) before tearing down the instance.
          if [ -n "${SNAP_NAME:-}" ]; then
            uv run remo aws snapshot delete "$INSTANCE_NAME" "$SNAP_NAME" --yes 2>/dev/null || true
          fi
          uv run remo aws destroy --name "$INSTANCE_NAME" --yes --remove-storage || true

  # ===========================================================================
  # Hetzner Cloud
  # ===========================================================================
  hetzner:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'workflow_dispatch' ||
       github.event.inputs.provider == 'all' ||
       github.event.inputs.provider == 'hetzner')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INSTANCE_NAME: ci-${{ github.run_id }}-hetzner
      HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install remo
        run: uv sync

      - name: Write SSH keys from secrets
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub

      - name: Reset SSH key in Hetzner Cloud
        run: |
          # Delete stale SSH key so Ansible recreates it with the current key
          KEY_ID=$(curl -fsSL -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            "https://api.hetzner.cloud/v1/ssh_keys?name=remote-coding-key" \
            | python3 -c "import sys,json; keys=json.load(sys.stdin)['ssh_keys']; print(keys[0]['id'] if keys else '')")
          if [ -n "$KEY_ID" ]; then
            curl -fsSL -X DELETE -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
              "https://api.hetzner.cloud/v1/ssh_keys/$KEY_ID"
            echo "Deleted stale SSH key (id: $KEY_ID)"
          else
            echo "No existing SSH key found — nothing to delete"
          fi

      - name: Provision
        run: uv run remo hetzner create --name "$INSTANCE_NAME"

      - name: Test SSH connectivity
        run: |
          HOST=$(curl -fsSL -H "Authorization: Bearer ${HETZNER_API_TOKEN}" \
            "https://api.hetzner.cloud/v1/servers?name=${INSTANCE_NAME}" \
            | python3 -c "import sys,json; s=json.load(sys.stdin)['servers']; print(s[0]['public_net']['ipv4']['ip'])")
          echo "Testing SSH to remo@$HOST..."
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 -o BatchMode=yes \
              -i ~/.ssh/id_rsa \
              "remo@$HOST" echo "connection-ok" | grep -q "connection-ok"
          echo "SSH connectivity: PASS"

      - name: Test info command
        run: |
          OUT=$(uv run remo hetzner info --name "$INSTANCE_NAME")
          echo "$OUT"
          echo "$OUT" | grep -q "Server ID:"   || { echo "FAIL: missing Server ID"; exit 1; }
          echo "$OUT" | grep -q "State:"       || { echo "FAIL: missing State"; exit 1; }
          echo "$OUT" | grep -q "Type:"        || { echo "FAIL: missing Type"; exit 1; }
          echo "$OUT" | grep -q "Cores:"       || { echo "FAIL: missing Cores"; exit 1; }
          echo "$OUT" | grep -q "Memory:"      || { echo "FAIL: missing Memory"; exit 1; }
          echo "$OUT" | grep -q "Volume:"      || { echo "FAIL: missing Volume"; exit 1; }
          echo "hetzner info: PASS"

      - name: Snapshot — create (async kickoff)
        run: |
          SNAP=ci-smoke-hetzner
          echo "SNAP_NAME=$SNAP" >> "$GITHUB_ENV"
          OUT=$(uv run remo hetzner snapshot create "$INSTANCE_NAME" --name "$SNAP" --description "smoke test")
          echo "$OUT"
          echo "$OUT" | grep -q "creation started" || { echo "FAIL: missing async-create hint"; exit 1; }
          echo "$OUT" | grep -q "several minutes" || { echo "FAIL: missing duration hint"; exit 1; }
          echo "hetzner snapshot create: PASS"

      - name: Snapshot — list shows pending then available
        run: |
          uv run remo hetzner snapshot list "$INSTANCE_NAME" | tee /tmp/list-1.txt
          grep -q "$SNAP_NAME" /tmp/list-1.txt || { echo "FAIL: snapshot missing from initial list"; exit 1; }
          grep -q "STATUS" /tmp/list-1.txt || { echo "FAIL: Hetzner list missing STATUS column"; exit 1; }

          # Poll up to 5 minutes for the snapshot to become available
          for attempt in $(seq 1 30); do
            OUT=$(uv run remo hetzner snapshot list "$INSTANCE_NAME")
            if echo "$OUT" | grep -E "^\s*$INSTANCE_NAME\s+$SNAP_NAME\s.*\savailable" >/dev/null; then
              echo "Snapshot $SNAP_NAME is available (attempt $attempt)"
              break
            fi
            echo "Attempt $attempt: not yet available; sleeping 10s..."
            sleep 10
          done
          uv run remo hetzner snapshot list "$INSTANCE_NAME" | grep -E "^\s*$INSTANCE_NAME\s+$SNAP_NAME\s.*\savailable" \
            || { echo "FAIL: snapshot did not reach available within 5 min"; exit 1; }
          echo "hetzner snapshot list: PASS"

      - name: Snapshot — delete
        run: |
          uv run remo hetzner snapshot delete "$INSTANCE_NAME" "$SNAP_NAME" --yes
          OUT=$(uv run remo hetzner snapshot list "$INSTANCE_NAME")
          if echo "$OUT" | grep -q "$SNAP_NAME"; then
            echo "FAIL: snapshot still present after delete"; exit 1
          fi
          echo "hetzner snapshot delete: PASS"

      - name: Teardown
        if: always()
        run: |
          if [ -n "${SNAP_NAME:-}" ]; then
            uv run remo hetzner snapshot delete "$INSTANCE_NAME" "$SNAP_NAME" --yes 2>/dev/null || true
          fi
          uv run remo hetzner destroy --name "$INSTANCE_NAME" --yes --remove-volume || true

  # ===========================================================================
  # Incus / LXC (local on runner)
  # ===========================================================================
  incus:
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'workflow_dispatch' ||
       github.event.inputs.provider == 'all' ||
       github.event.inputs.provider == 'incus')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CONTAINER_NAME: ci-test

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install remo
        run: uv sync

      - name: Write SSH keys from secrets
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
          chmod 600 ~/.ssh/id_rsa
          chmod 644 ~/.ssh/id_rsa.pub

      - name: Bootstrap Incus
        run: sudo env "PATH=$PATH" uv run remo incus bootstrap --network-type bridge --user $USER

      - name: Fix Ansible collections after sudo bootstrap
        run: |
          # sudo bootstrap may install Ansible collections and marker files
          # under root's HOME or the runner's HOME (depending on sudo config).
          # Reclaim ownership and delete the marker so the runner user
          # re-installs collections it can read.
          sudo chown -R "$(id -u):$(id -g)" ~/.ansible ~/.config/remo 2>/dev/null || true
          sudo chown -R "$(id -u):$(id -g)" /root/.ansible 2>/dev/null && \
            cp -a /root/.ansible/collections ~/.ansible/ 2>/dev/null || true
          rm -f ~/.config/remo/collections.lock

      - name: Fix Docker/Incus iptables conflict
        run: |
          # Docker sets FORWARD policy to DROP, blocking Incus bridge NAT.
          # Add DOCKER-USER rules to allow Incus bridge traffic.
          # See: https://linuxcontainers.org/incus/docs/main/howto/network_bridge_firewalld/
          sudo iptables -I DOCKER-USER -i incusbr0 -j ACCEPT
          sudo iptables -I DOCKER-USER -o incusbr0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT

      - name: Create container
        run: |
          # Run via sg to pick up incus-admin group without re-login
          sg incus-admin -c "uv run remo incus create --name $CONTAINER_NAME"

      - name: Test connectivity
        run: |
          # Get container IP from incus (known_hosts stores name, not IP)
          # Query via sg (as the runner), never `sudo incus`: sudo keeps
          # HOME=/home/runner here, so a root-run incus client writes a
          # root-owned ~/.config/incus/config.yml that every later
          # runner-owned `remo incus ...` step then fails to read with
          # "permission denied". Same incus-admin group route as every other
          # incus call in this job.
          HOST=$(sg incus-admin -c "incus list $CONTAINER_NAME --format=json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin)[0]['state']['network']['eth0']['addresses']; print([a['address'] for a in d if a['family']=='inet'][0])")
          echo "HOST=$HOST" >> "$GITHUB_ENV"
          echo "Testing SSH to remo@$HOST..."
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 -o BatchMode=yes \
              -i ~/.ssh/id_rsa \
              "remo@$HOST" echo "connection-ok" | grep -q "connection-ok"
          echo "Incus connectivity: PASS"

      - name: Test info command
        run: |
          OUT=$(sg incus-admin -c "uv run remo incus info --name $CONTAINER_NAME")
          echo "$OUT"
          echo "$OUT" | grep -q "State:"     || { echo "FAIL: missing State"; exit 1; }
          echo "$OUT" | grep -q "IP:"        || { echo "FAIL: missing IP"; exit 1; }
          echo "$OUT" | grep -q "Cores:"     || { echo "FAIL: missing Cores"; exit 1; }
          echo "$OUT" | grep -q "Memory:"    || { echo "FAIL: missing Memory"; exit 1; }
          echo "$OUT" | grep -q "Root size:" || { echo "FAIL: missing Root size"; exit 1; }
          echo "incus info: PASS"

      - name: Verify dev tools
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 -o BatchMode=yes -i ~/.ssh/id_rsa remo@$HOST"
          verify_tools() {
            echo "--- Docker ---"
            $SSH_CMD "docker --version"
            $SSH_CMD "docker info > /dev/null 2>&1"
            echo "  docker info: OK (daemon running)"
            echo "--- Node.js ---"
            $SSH_CMD "node --version"
            $SSH_CMD "npm --version"
            echo "--- Git ---"
            $SSH_CMD "git --version"
            echo "--- GitHub CLI ---"
            $SSH_CMD "gh --version"
            echo "--- fzf ---"
            $SSH_CMD "fzf --version"
            echo "--- Zellij ---"
            $SSH_CMD "zellij --version"
            echo "--- User / sudo ---"
            $SSH_CMD "id remo"
            $SSH_CMD "sudo -n true"
            echo "  passwordless sudo: OK"
          }
          verify_tools
          echo "Dev tools verification: PASS"

      - name: Test update (idempotent)
        run: |
          sg incus-admin -c "uv run remo incus update --name $CONTAINER_NAME"
          echo "Incus update: PASS"

      - name: Verify tools after update
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 -o BatchMode=yes -i ~/.ssh/id_rsa remo@$HOST"
          verify_tools() {
            echo "--- Docker ---"
            $SSH_CMD "docker --version"
            $SSH_CMD "docker info > /dev/null 2>&1"
            echo "  docker info: OK (daemon running)"
            echo "--- Node.js ---"
            $SSH_CMD "node --version"
            $SSH_CMD "npm --version"
            echo "--- Git ---"
            $SSH_CMD "git --version"
            echo "--- GitHub CLI ---"
            $SSH_CMD "gh --version"
            echo "--- fzf ---"
            $SSH_CMD "fzf --version"
            echo "--- Zellij ---"
            $SSH_CMD "zellij --version"
            echo "--- User / sudo ---"
            $SSH_CMD "id remo"
            $SSH_CMD "sudo -n true"
            echo "  passwordless sudo: OK"
          }
          verify_tools
          echo "Post-update dev tools verification: PASS"

      - name: Snapshot — create
        run: |
          SNAP=ci-smoke-incus
          echo "SNAP_NAME=$SNAP" >> "$GITHUB_ENV"
          OUT=$(sg incus-admin -c "uv run remo incus snapshot create $CONTAINER_NAME --name $SNAP --description 'smoke test'")
          echo "$OUT"
          echo "$OUT" | grep -q "Created snapshot '$SNAP'" || { echo "FAIL: missing sync-create success message"; exit 1; }
          echo "incus snapshot create: PASS"

      - name: Snapshot — list shows the new snapshot
        run: |
          OUT=$(sg incus-admin -c "uv run remo incus snapshot list $CONTAINER_NAME")
          echo "$OUT"
          echo "$OUT" | grep -q "$SNAP_NAME" || { echo "FAIL: snapshot missing from list"; exit 1; }
          # Incus list MUST NOT have a STATUS column (always AVAILABLE)
          if echo "$OUT" | head -1 | grep -q "STATUS"; then
            echo "FAIL: Incus list should not have a STATUS column"; exit 1
          fi
          echo "incus snapshot list: PASS"

      - name: Snapshot — restore round-trip
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 -o BatchMode=yes -i ~/.ssh/id_rsa remo@$HOST"

          # Plant a marker file inside the container AFTER the snapshot was
          # taken. If restore works, this marker must be gone afterwards.
          $SSH_CMD "echo post-snapshot > /tmp/should-be-gone-after-restore.txt"
          $SSH_CMD "test -f /tmp/should-be-gone-after-restore.txt"
          echo "Marker file planted post-snapshot."

          # Restore. -y to bypass the confirm. The provider stops the
          # container, restores, and starts it again.
          sg incus-admin -c "uv run remo incus snapshot restore $CONTAINER_NAME $SNAP_NAME -y"

          # Container may take a few seconds to come back online after start.
          for attempt in $(seq 1 12); do
            if $SSH_CMD "echo connection-ok" 2>/dev/null | grep -q "connection-ok"; then
              echo "SSH back after restore (attempt $attempt)"
              break
            fi
            sleep 5
          done

          # The post-snapshot marker MUST be gone (SC-001).
          if $SSH_CMD "test -f /tmp/should-be-gone-after-restore.txt" 2>/dev/null; then
            echo "FAIL: marker file still present after restore — rollback didn't happen"
            exit 1
          fi
          echo "Post-restore: marker file is gone — rollback PASS"
          echo "incus snapshot restore: PASS"

      - name: Snapshot — delete
        run: |
          sg incus-admin -c "uv run remo incus snapshot delete $CONTAINER_NAME $SNAP_NAME -y"
          OUT=$(sg incus-admin -c "uv run remo incus snapshot list $CONTAINER_NAME")
          if echo "$OUT" | grep -q "$SNAP_NAME"; then
            echo "FAIL: snapshot still present after delete"
            echo "$OUT"
            exit 1
          fi
          echo "incus snapshot delete: PASS"

      - name: Snapshot — destroy-time cleanup prompt
        run: |
          # Create two snapshots, then destroy with -y. The destroy-time prompt
          # is bypassed by -y, defaulting to KEEP snapshots (safer default).
          # The destroy output must mention the snapshots and the keep-warning.
          # We re-create the container after so the rest of the suite (cp tests)
          # has a clean target.
          sg incus-admin -c "uv run remo incus snapshot create $CONTAINER_NAME --name keep-1"
          sg incus-admin -c "uv run remo incus snapshot create $CONTAINER_NAME --name keep-2"

          # Capture destroy output to verify the prompt path fires
          OUT=$(sg incus-admin -c "uv run remo incus destroy --name $CONTAINER_NAME --yes" 2>&1 || true)
          echo "$OUT"
          echo "$OUT" | grep -q "has 2 snapshot" || { echo "FAIL: destroy did not mention snapshots"; exit 1; }
          echo "$OUT" | grep -q "keeping the 2 snapshot" || { echo "FAIL: destroy did not print --yes keep warning"; exit 1; }
          echo "incus destroy snapshot-prompt: PASS"

          # Re-create the container for downstream steps (cp tests etc.)
          sg incus-admin -c "uv run remo incus create --name $CONTAINER_NAME"
          # Refresh $HOST since the container was rebuilt
          # Query via sg (as the runner), never `sudo incus`: sudo keeps
          # HOME=/home/runner here, so a root-run incus client writes a
          # root-owned ~/.config/incus/config.yml that every later
          # runner-owned `remo incus ...` step then fails to read with
          # "permission denied". Same incus-admin group route as every other
          # incus call in this job.
          HOST=$(sg incus-admin -c "incus list $CONTAINER_NAME --format=json" | \
            python3 -c "import sys,json; d=json.load(sys.stdin)[0]['state']['network']['eth0']['addresses']; print([a['address'] for a in d if a['family']=='inet'][0])")
          echo "HOST=$HOST" >> "$GITHUB_ENV"

      - name: Prepare for remo cp tests
        run: |
          # Make container name resolvable (remo stores name, not IP, for Incus)
          echo "$HOST ci-test" | sudo tee -a /etc/hosts

          # remo doesn't set StrictHostKeyChecking=no for non-SSM connections
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<'SSHEOF'
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          SSHEOF
          chmod 600 ~/.ssh/config

          # Generate test fixtures
          FIXTURES=/tmp/remo-cp-test
          mkdir -p "$FIXTURES/upload" "$FIXTURES/download" "$FIXTURES/upload/testdir/nested"
          echo "hello-single" > "$FIXTURES/upload/single.txt"
          sha256sum "$FIXTURES/upload/single.txt" | awk '{print $1}' > "$FIXTURES/upload/single.sha256"
          echo "multi-one" > "$FIXTURES/upload/multi1.txt"
          echo "multi-two" > "$FIXTURES/upload/multi2.txt"
          echo "nested-file" > "$FIXTURES/upload/testdir/nested/deep.txt"
          echo "top-level" > "$FIXTURES/upload/testdir/top.txt"
          dd if=/dev/urandom of="$FIXTURES/upload/progress-test.bin" bs=1024 count=1024 2>/dev/null
          echo "named-upload" > "$FIXTURES/upload/named.txt"
          echo "FIXTURES=$FIXTURES" >> "$GITHUB_ENV"
          echo "Test fixtures created in $FIXTURES"

      - name: Test remo cp upload (single file)
        run: |
          uv run remo cp "$FIXTURES/upload/single.txt" :/tmp/
          EXPECTED=$(cat "$FIXTURES/upload/single.sha256")
          ACTUAL=$(ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_rsa "remo@$HOST" "sha256sum /tmp/single.txt" | awk '{print $1}')
          [ "$EXPECTED" = "$ACTUAL" ]
          echo "Single file upload + checksum: PASS"

      - name: Test remo cp upload (multi-file and directory)
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"
          uv run remo cp "$FIXTURES/upload/multi1.txt" "$FIXTURES/upload/multi2.txt" :/tmp/
          $SSH_CMD "cat /tmp/multi1.txt" | grep -q "multi-one"
          $SSH_CMD "cat /tmp/multi2.txt" | grep -q "multi-two"
          echo "Multi-file upload: PASS"

          uv run remo cp -r "$FIXTURES/upload/testdir/" :/tmp/testdir/
          $SSH_CMD "cat /tmp/testdir/top.txt" | grep -q "top-level"
          $SSH_CMD "cat /tmp/testdir/nested/deep.txt" | grep -q "nested-file"
          echo "Directory upload (nested structure): PASS"

      - name: Test remo cp download
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"
          # Create files inside container
          $SSH_CMD "echo 'remote-created-content' > /tmp/remote-created.txt"
          $SSH_CMD "mkdir -p /tmp/download-dir/sub && echo 'dl-top' > /tmp/download-dir/top.txt && echo 'dl-sub' > /tmp/download-dir/sub/nested.txt"

          # Download single file
          uv run remo cp :/tmp/remote-created.txt "$FIXTURES/download/"
          grep -q "remote-created-content" "$FIXTURES/download/remote-created.txt"
          echo "Single file download: PASS"

          # Download directory
          uv run remo cp -r :/tmp/download-dir/ "$FIXTURES/download/download-dir/"
          grep -q "dl-top" "$FIXTURES/download/download-dir/top.txt"
          grep -q "dl-sub" "$FIXTURES/download/download-dir/sub/nested.txt"
          echo "Directory download (nested structure): PASS"

      - name: Test remo cp named instance and progress flag
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"
          # Upload with named instance
          uv run remo cp "$FIXTURES/upload/named.txt" "${CONTAINER_NAME}:/tmp/"
          $SSH_CMD "cat /tmp/named.txt" | grep -q "named-upload"
          echo "Named instance upload: PASS"

          # Download with named instance
          $SSH_CMD "echo 'named-download-content' > /tmp/named-dl.txt"
          uv run remo cp "${CONTAINER_NAME}:/tmp/named-dl.txt" "$FIXTURES/download/"
          grep -q "named-download-content" "$FIXTURES/download/named-dl.txt"
          echo "Named instance download: PASS"

          # Progress flag (just verify it doesn't error)
          uv run remo cp --progress "$FIXTURES/upload/progress-test.bin" :/tmp/
          $SSH_CMD "test -f /tmp/progress-test.bin"
          echo "Progress flag upload: PASS"

      - name: Test remo cp error cases
        run: |
          # Nonexistent source file
          if uv run remo cp /tmp/this-does-not-exist.txt :/tmp/ 2>/dev/null; then
            echo "FAIL: expected error for nonexistent source" && exit 1
          fi
          echo "Nonexistent source error: PASS"

          # Directory without -r flag
          if uv run remo cp "$FIXTURES/upload/testdir/" :/tmp/testdir-norec/ 2>/dev/null; then
            echo "FAIL: expected error for directory without -r" && exit 1
          fi
          echo "Directory without -r error: PASS"

          # No remote side specified
          if uv run remo cp /tmp/foo.txt /tmp/bar.txt 2>/dev/null; then
            echo "FAIL: expected error for no remote side" && exit 1
          fi
          echo "No remote side error: PASS"

      - name: Test git clone inside container
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"
          $SSH_CMD "git --version"
          echo "Git installed: PASS"

          $SSH_CMD "cd /tmp && git clone https://github.com/octocat/Hello-World.git"
          $SSH_CMD "test -f /tmp/Hello-World/README"
          echo "Git clone + network egress: PASS"

      - name: Install expect for interactive tests
        run: |
          sudo apt-get update && sudo apt-get install -y expect

          # Disable project-menu auto-start so remo shell lands on a bash prompt.
          # The menu launches Zellij TUI which can't be driven by expect.
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"
          $SSH_CMD "sed -i '/# BEGIN ANSIBLE MANAGED BLOCK - PROJECT MENU/,/# END ANSIBLE MANAGED BLOCK - PROJECT MENU/d' ~/.bashrc"

      - name: Test remo shell basic access
        run: |
          expect <<'EXPECT'
          set timeout 30
          spawn uv run remo shell
          expect {
            "$ " {}
            timeout { puts "FAIL: timed out waiting for prompt"; exit 1 }
          }
          send "whoami\r"
          expect {
            "remo" {}
            timeout { puts "FAIL: whoami did not return remo"; exit 1 }
          }
          expect "$ "
          send "hostname\r"
          expect {
            -re ".+" {}
            timeout { puts "FAIL: hostname returned nothing"; exit 1 }
          }
          expect "$ "
          send "exit\r"
          expect eof
          puts "remo shell basic access: PASS"
          EXPECT

      - name: Test remo shell environment
        run: |
          expect <<'EXPECT'
          set timeout 30
          spawn uv run remo shell
          expect {
            "$ " {}
            timeout { puts "FAIL: timed out waiting for prompt"; exit 1 }
          }
          send "echo TERM=\$TERM\r"
          expect {
            -re "TERM=.+" {}
            timeout { puts "FAIL: TERM not set"; exit 1 }
          }
          expect "$ "
          send "echo TZ=\$TZ\r"
          expect {
            -re "TZ=.*" {}
            timeout { puts "FAIL: TZ echo timed out"; exit 1 }
          }
          expect "$ "
          send "exit\r"
          expect eof
          puts "remo shell environment: PASS"
          EXPECT

      - name: Test remo shell port forwarding
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"

          # Start HTTP server inside container
          $SSH_CMD "nohup python3 -m http.server 8080 > /dev/null 2>&1 &"
          sleep 1

          # Background expect: open shell with tunnel, hold it open
          cat > /tmp/tunnel-test.exp <<'EXPECT'
          set timeout 30
          spawn uv run remo shell -L 8080 --no-open
          expect {
            "$ " {}
            timeout { puts "FAIL: timed out waiting for prompt"; exit 1 }
          }
          # Hold connection open
          sleep 30
          send "exit\r"
          expect eof
          EXPECT
          expect /tmp/tunnel-test.exp &
          EXPECT_PID=$!

          # Wait for tunnel to establish
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              echo "Tunnel active after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:8080 > /dev/null
          echo "remo shell port forwarding: PASS"

          # Cleanup
          kill $EXPECT_PID 2>/dev/null || true
          $SSH_CMD "pkill -f 'python3 -m http.server 8080'" 2>/dev/null || true

      - name: Test remo shell multiple tunnels
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa remo@$HOST"

          # Start two HTTP servers inside container
          $SSH_CMD "nohup python3 -m http.server 9090 > /dev/null 2>&1 &"
          $SSH_CMD "nohup python3 -m http.server 3000 > /dev/null 2>&1 &"
          sleep 1

          # Background expect: open shell with both tunnels
          cat > /tmp/multi-tunnel-test.exp <<'EXPECT'
          set timeout 30
          spawn uv run remo shell -L 9090 -L 3000 --no-open
          expect {
            "$ " {}
            timeout { puts "FAIL: timed out waiting for prompt"; exit 1 }
          }
          sleep 30
          send "exit\r"
          expect eof
          EXPECT
          expect /tmp/multi-tunnel-test.exp &
          EXPECT_PID=$!

          # Wait for tunnels to establish
          for i in $(seq 1 15); do
            if curl -sf http://localhost:9090 > /dev/null 2>&1 && \
               curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Both tunnels active after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://localhost:9090 > /dev/null
          echo "Tunnel 9090: OK"
          curl -sf http://localhost:3000 > /dev/null
          echo "Tunnel 3000: OK"
          echo "remo shell multiple tunnels: PASS"

          # Cleanup
          kill $EXPECT_PID 2>/dev/null || true
          $SSH_CMD "pkill -f 'python3 -m http.server 9090'" 2>/dev/null || true
          $SSH_CMD "pkill -f 'python3 -m http.server 3000'" 2>/dev/null || true

      - name: Test remo shell -p / --exec / --detach (project-launch passthrough)
        run: |
          SSH_CMD="ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=30 -o BatchMode=yes -i ~/.ssh/id_rsa remo@$HOST"

          # Plant a project dir without a .devcontainer so we exercise the
          # host-side branches of project-launch (no docker dance needed in CI).
          $SSH_CMD "mkdir -p ~/projects/smoke-proj && \
            echo 'placeholder' > ~/projects/smoke-proj/README"

          # --- Foreground --exec on a no-devcontainer project (Case 4) ---
          OUT=$(uv run remo shell -p smoke-proj --exec 'echo hello-$REMO_PROJECT-$REMO_INSTANCE && pwd' 2>&1)
          echo "$OUT"
          echo "$OUT" | grep -q "hello-smoke-proj-" || {
            echo "FAIL: --exec did not run / env vars missing"; exit 1; }
          echo "$OUT" | grep -q "/projects/smoke-proj" || {
            echo "FAIL: --exec did not cd into project dir"; exit 1; }
          echo "remo shell -p --exec (foreground): PASS"

          # --- Detached --exec writes log file and returns immediately ---
          DETACH_OUT=$(uv run remo shell -p smoke-proj --detach \
            --exec 'sleep 1 && echo detached-marker-$REMO_PROJECT' 2>&1)
          echo "$DETACH_OUT"
          echo "$DETACH_OUT" | grep -q "Launched detached" || {
            echo "FAIL: detach didn't print launched message"; exit 1; }
          # Give the background command a moment to finish
          sleep 3
          LOG=$($SSH_CMD "cat ~/.local/state/remo/smoke-proj.log")
          echo "log contents:"; echo "$LOG"
          echo "$LOG" | grep -q "detached-marker-smoke-proj" || {
            echo "FAIL: detached command did not run / log missing marker"; exit 1; }
          echo "remo shell -p --detach --exec: PASS"

          # --- Validation: --exec without -p exits 2 ---
          if uv run remo shell --exec 'true' 2>/dev/null; then
            echo "FAIL: --exec without -p should have errored"; exit 1
          fi
          echo "validation: --exec without -p errors as expected"

          # --- Validation: --detach without --exec exits 2 ---
          if uv run remo shell -p smoke-proj --detach 2>/dev/null; then
            echo "FAIL: --detach without --exec should have errored"; exit 1
          fi
          echo "validation: --detach without --exec errors as expected"

      - name: Teardown
        if: always()
        run: |
          sg incus-admin -c "uv run remo incus destroy --name $CONTAINER_NAME --yes" || true
