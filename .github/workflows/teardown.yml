name: Teardown Server

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm teardown (volume will be preserved)'
        required: true
        default: ''

jobs:
  teardown:
    name: Teardown Remote Coding Server
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Ansible and dependencies
        run: |
          uv pip install --system ansible requests python-dateutil
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run teardown playbook (preserve volume)
        env:
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
        run: |
          cd ansible
          ansible-playbook hetzner_teardown.yml -e auto_confirm=true
