name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest --tb=short -q

  docker-image:
    name: Docker image (amd64 + arm64)
    runs-on: ubuntu-latest
    # This job is the only thing that actually builds docker/Dockerfile. The
    # tests/image/ checks that run in the `test` job above are structural --
    # they grep the Dockerfile for the right strings -- so without this a
    # genuinely broken image (failed npm ci, moved asset path, bad arch
    # branch) ships green. Multi-minute by nature: an emulated arm64 build
    # runs npm ci and pip install under QEMU.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7

      # Registers binfmt handlers so the arm64 half of tests/image/ can build
      # under emulation on an amd64 runner. The arch-selection branch
      # (FR-027/FR-042) has no other way to be exercised here.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras

      # REMO_RUN_IMAGE_TESTS=1 opts into tier 2 of tests/image/: real
      # `docker buildx build` for amd64 + arm64, then runs the built image
      # under compose.example.yml's hardening flags and asserts non-root UID,
      # a genuinely read-only rootfs, an arch-correct session-manager-plugin,
      # and that /api/v1/ready gates on missing mounts. The tests skip
      # honestly (not fail) if emulation turns out to be unusable.
      - name: Build and verify the remo-web image
        env:
          REMO_RUN_IMAGE_TESTS: "1"
        run: uv run pytest tests/image/ -v --tb=short

  wheel-install:
    name: Wheel install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel into a fresh venv (non-editable)
        run: |
          uv venv /tmp/remo-wheel-test
          uv pip install --python /tmp/remo-wheel-test/bin/python dist/*.whl

      - name: Verify ansible dir is found and contains playbooks
        run: |
          /tmp/remo-wheel-test/bin/python - <<'EOF'
          from remo_cli.core.config import get_ansible_dir
          d = get_ansible_dir()
          print(f"ansible_dir: {d}")
          assert (d / "incus_configure.yml").is_file(), f"incus_configure.yml not found in {d}"
          assert (d / "requirements.yml").is_file(), f"requirements.yml not found in {d}"
          assert not (d / "__init__.py").exists(), f"ansible_dir looks like a Python package: {d}"
          print("OK: ansible playbooks found in installed wheel")
          EOF

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff check
        run: uv run ruff check src/remo_cli
