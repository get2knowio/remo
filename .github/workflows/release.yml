name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --python ${{ matrix.python-version }}

      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest --tb=short -q

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Consumed by publish-image to decide whether this tag may move the
      # `latest` image tag (pre-releases must not).
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Check if pre-release
        id: prerelease
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ "$TAG" == *"rc"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"dev"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "This is a pre-release"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "This is a stable release"
          fi

      - name: Get previous tag
        id: prev_tag
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          IS_PRE="${{ steps.prerelease.outputs.is_prerelease }}"

          if [ "$IS_PRE" == "true" ]; then
            # Pre-release: compare against immediately previous tag
            PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          else
            # Stable release: find the previous stable tag (skip rc/beta/alpha)
            PREV_TAG=$(git tag -l | grep -v -E '(rc|beta|alpha|dev)' | grep -v "^${TAG}$" | sort -V | tail -1)
            PREV_TAG="${PREV_TAG:-}"
          fi

          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG="${{ steps.prev_tag.outputs.prev_tag }}"
          VERSION="${TAG#v}"

          # Create release notes file
          cat > release_notes.md << 'HEADER'
          ## Installation

          ```bash
          # Run directly (no install needed)
          uvx remo-cli

          # Or install globally
          uv tool install remo-cli
          pip install remo-cli
          ```
          HEADER

          # Add pre-release note if applicable
          if [ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ]; then
            cat >> release_notes.md << PRERELEASE

          > **Note:** This is a pre-release version for testing. Install with:
          > \`\`\`bash
          > uv tool install remo-cli==${VERSION}
          > \`\`\`
          PRERELEASE
          fi

          # Add changes section
          echo "" >> release_notes.md

          if [ "${{ steps.prerelease.outputs.is_prerelease }}" == "true" ] && [ -n "$PREV_TAG" ]; then
            # Pre-release: list commits since previous tag
            echo "## Changes" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> release_notes.md
            echo "" >> release_notes.md
            echo "" >> release_notes.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...$TAG" >> release_notes.md
          elif [ "${{ steps.prerelease.outputs.is_prerelease }}" == "false" ]; then
            # Stable release: use the curated tag annotation message
            TAG_MSG=$(git tag -l --format='%(contents)' "$TAG" | tail -n +2)
            if [ -n "$TAG_MSG" ]; then
              echo "$TAG_MSG" >> release_notes.md
            elif [ -n "$PREV_TAG" ]; then
              echo "## Changes" >> release_notes.md
              echo "" >> release_notes.md
              git log --pretty=format:"- %s" ${PREV_TAG}..HEAD >> release_notes.md
            fi
            echo "" >> release_notes.md
            if [ -n "$PREV_TAG" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...$TAG" >> release_notes.md
            fi
          else
            echo "Initial release" >> release_notes.md
          fi

      - name: Create Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          body_path: release_notes.md
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          draft: false

  publish:
    needs: [test, release]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # release/v1

  publish-image:
    # Publishes the remo-web container image that docker/compose.example.yml
    # pulls by default, so home-lab users can deploy with just a Compose file
    # instead of a full source checkout.
    needs: [test, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # An emulated arm64 build (npm ci + pip install under QEMU) dominates
    # this job's runtime.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # Needed for the linux/arm64 half of the manifest: GitHub's runners are
      # amd64, so arm64 is cross-built under emulation.
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/remo-web
          # latest=false disables this action's automatic `latest`; the raw
          # tag below re-adds it only for stable releases, so an rc/beta tag
          # can never move the `latest` that compose.example.yml pulls.
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ needs.release.outputs.is_prerelease == 'false' }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Includes org.opencontainers.image.source, which is what links the
          # published GHCR package back to this repository.
          labels: ${{ steps.meta.outputs.labels }}
