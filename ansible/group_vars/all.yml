---
# Hetzner Cloud Configuration
hetzner_api_token: "{{ lookup('env', 'HETZNER_API_TOKEN') }}"
hetzner_server_name: "remo"
hetzner_server_type: "cx23"  # Smallest shared vCPU (2 vCPU, 4GB RAM) - cheapest option
hetzner_image: "ubuntu-24.04"
hetzner_location: "hel1"  # Falkenstein datacenter
hetzner_ssh_key_name: "remote-coding-key"

# Volume settings for persistent home directory
hetzner_volume_name: "{{ hetzner_server_name }}-home"
hetzner_volume_size: 20  # GB (minimum 10)

# AWS Configuration
aws_access_key_id: "{{ lookup('env', 'AWS_ACCESS_KEY_ID') }}"
aws_secret_access_key: "{{ lookup('env', 'AWS_SECRET_ACCESS_KEY') }}"
aws_region: "{{ lookup('env', 'AWS_REGION') | default('us-west-2', true) }}"

# User Configuration
remo_user: "remo"

# Development workspace directory (used by devshell script)
dev_workspace_dir: "/home/{{ remo_user }}/projects"

# Zellij Configuration
zellij_session_name: "main"  # Session name for SSH auto-attach

# Node.js Configuration
nodejs_version: "24"  # LTS version

# ============================================================================
# Remo Notifier (spec 008 — channels)
# ============================================================================
# Channel-based notifier sidecar that delivers agentsh approval requests to a
# human and resolves the decision back to agentsh. Stood up ONLY via
# `remo notifier deploy <host> --channel <id>` (FR-009a) — not during
# provisioning. Credentials follow the REMO_NOTIFIER_<CHANNEL>_* convention plus
# the channel-independent agentsh approver connection below.

# agentsh approver connection (required for every channel).
remo_notifier_agentsh_api_url: "{{ lookup('env', 'REMO_NOTIFIER_AGENTSH_API_URL') }}"
remo_notifier_agentsh_api_key: "{{ lookup('env', 'REMO_NOTIFIER_AGENTSH_API_KEY') }}"

# Telegram channel credentials (used when channel = telegram).
remo_notifier_channel_secret: "{{ lookup('env', 'REMO_NOTIFIER_TELEGRAM_BOT_TOKEN') }}"
remo_notifier_telegram_chat_id: "{{ lookup('env', 'REMO_NOTIFIER_TELEGRAM_CHAT_ID') }}"
