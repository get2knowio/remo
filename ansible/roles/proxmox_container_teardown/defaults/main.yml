---
# Default variables for proxmox_container_teardown role.

# Container hostname (REQUIRED). Looked up to VMID via /etc/pve/lxc/*.conf.
# proxmox_container_name: ""

# Optional explicit VMID; bypasses hostname-to-VMID lookup when set.
proxmox_container_vmid_input: ""

# Forcefully destroy even if running (skips graceful stop).
proxmox_container_force: false

# Pass --purge to pct destroy. This removes the container from backup,
# replication, and HA job configurations. The rootfs is always destroyed
# by pct destroy regardless of this flag.
proxmox_container_purge: false
