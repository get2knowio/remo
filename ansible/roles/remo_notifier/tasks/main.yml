---
# Deploy the remo notifier as a hardened Docker container managed by systemd.
# Channel-agnostic: the channel id, transport TOML fragment, and secret come
# from the CLI/descriptor. Registered-variable access uses | default() (Constitution I).

- name: Pre-flight — agentsh approver connection is present
  ansible.builtin.assert:
    that:
      - remo_notifier_agentsh_api_url | default('') | length > 0
      - remo_notifier_agentsh_api_key | default('') | length > 0
    fail_msg: >-
      Missing agentsh approver connection. Set REMO_NOTIFIER_AGENTSH_API_URL and
      REMO_NOTIFIER_AGENTSH_API_KEY before deploying the notifier (see the README
      "Notifier" section).
    success_msg: "agentsh approver connection present."

- name: Pre-flight — channel secret is present
  ansible.builtin.assert:
    that:
      - remo_notifier_channel_secret | default('') | length > 0
    fail_msg: >-
      Missing the {{ remo_notifier_channel }} channel secret. Set the channel's
      REMO_NOTIFIER_<CHANNEL>_* token before deploying.
    success_msg: "{{ remo_notifier_channel }} channel secret present."
  when: remo_notifier_secret_filename | default('') | length > 0

- name: Create notifier config and secrets directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  loop:
    - "{{ remo_notifier_config_dir }}"
    - "{{ remo_notifier_secrets_dir }}"

- name: Render notifier config
  ansible.builtin.template:
    src: notifier.toml.j2
    dest: "{{ remo_notifier_config_dir }}/notifier.toml"
    owner: root
    group: root
    mode: "0640"
  notify: "Restart remo-notifier"

- name: Write the channel secret
  ansible.builtin.copy:
    content: "{{ remo_notifier_channel_secret }}"
    dest: "{{ remo_notifier_secrets_dir }}/{{ remo_notifier_secret_filename }}"
    owner: root
    group: root
    mode: "0400"
  no_log: true
  when: remo_notifier_secret_filename | default('') | length > 0
  notify: "Restart remo-notifier"

- name: Write the agentsh approver key
  ansible.builtin.copy:
    content: "{{ remo_notifier_agentsh_api_key }}"
    dest: "{{ remo_notifier_secrets_dir }}/{{ remo_notifier_agentsh_secret_filename }}"
    owner: root
    group: root
    mode: "0400"
  no_log: true
  notify: "Restart remo-notifier"

- name: Stage the image build context on the host
  ansible.builtin.copy:
    src: "{{ remo_notifier_build_context_local }}/"
    dest: "{{ remo_notifier_source_dir }}/"
    mode: "0644"
    directory_mode: "0755"
  when:
    - remo_notifier_build_from_source | default(true) | bool
    - remo_notifier_build_context_local | default('') | length > 0

- name: Build the notifier image on the host (per channel)
  community.docker.docker_image:
    name: "{{ remo_notifier_image }}"
    source: build
    force_source: "{{ remo_notifier_force_rebuild | default(false) | bool }}"
    build:
      path: "{{ remo_notifier_source_dir }}"
      dockerfile: notifier/Dockerfile
      args:
        CHANNEL: "{{ remo_notifier_channel }}"
  when: remo_notifier_build_from_source | default(true) | bool
  notify: "Restart remo-notifier"

- name: Pull the notifier image
  community.docker.docker_image:
    name: "{{ remo_notifier_image }}"
    source: pull
  when: not (remo_notifier_build_from_source | default(true) | bool)
  notify: "Restart remo-notifier"

- name: Install systemd unit
  ansible.builtin.template:
    src: remo-notifier.service.j2
    dest: /etc/systemd/system/remo-notifier.service
    owner: root
    group: root
    mode: "0644"
  notify: "Restart remo-notifier"

- name: Enable and start the notifier service
  ansible.builtin.systemd:
    name: remo-notifier.service
    enabled: true
    state: started
    daemon_reload: true

- name: Apply any pending restarts before health-checking
  ansible.builtin.meta: flush_handlers

- name: Wait for the notifier health endpoint
  ansible.builtin.uri:
    url: "http://{{ remo_notifier_bind_address }}:{{ remo_notifier_listen_port }}/v1/health"
    status_code: 200
  register: notifier_health
  retries: 10
  delay: 2
  until: notifier_health.status | default(0) == 200
  changed_when: false

- name: Report notifier status
  ansible.builtin.debug:
    msg: >-
      remo-notifier ({{ remo_notifier_channel }}) is healthy on
      {{ remo_notifier_bind_address }}:{{ remo_notifier_listen_port }}
      (pending approvals:
      {{ notifier_health.json.pending_approvals | default('unknown') }}).
