---
# Hetzner Configure Playbook - Install/update dev tools on an existing server
# Run this to update an already provisioned Hetzner server
#
# Usage:
#   ./run.sh hetzner_configure.yml -i "<server-ip>," -e "ansible_user=remo"
#
# Optional variables:
#   configure_docker: Enable/disable docker (default: true)
#   configure_user_setup: Enable/disable user_setup (default: true)
#   configure_nodejs: Enable/disable nodejs (default: true)
#   configure_devcontainers: Enable/disable devcontainers (default: true)
#   configure_github_cli: Enable/disable github_cli (default: true)
#   configure_fzf: Enable/disable fzf (default: true)
#   configure_zellij: Enable/disable zellij (default: true)

- name: Configure Hetzner Cloud Server
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Wait for apt to be ready
      ansible.builtin.shell: |
        while fuser /var/lib/dpkg/lock-frontend /var/lib/apt/lists/lock /var/cache/apt/archives/lock >/dev/null 2>&1; do
          sleep 5
        done
      args:
        executable: /bin/bash
      register: apt_lock_result
      changed_when: false
      retries: 30
      delay: 10
      until: apt_lock_result.rc | default(1) == 0

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file

  tasks:
    - name: Configure dev tools
      ansible.builtin.include_tasks: tasks/configure_dev_tools.yml

    # 005-credential-broker: install the broker daemon and assert the
    # bootstrap-token file is in place (SSH-pushed earlier by `remo hetzner create`).
    # Skipped until the user opts in via REMO_BROKER_BACKEND (release not yet published).
    - name: Install remo credential broker
      ansible.builtin.include_role:
        name: broker_install
      when: lookup('env', 'REMO_BROKER_BACKEND') | default('', true) | length > 0

    - name: Notify that broker install was skipped
      ansible.builtin.debug:
        msg: "Skipping remo-broker install: REMO_BROKER_BACKEND is not set on the laptop env."
      when: lookup('env', 'REMO_BROKER_BACKEND') | default('', true) | length == 0

    - name: Assert bootstrap token file present and mode 0400 root
      ansible.builtin.include_role:
        name: bootstrap_token_file
      when: lookup('env', 'REMO_BROKER_BACKEND') | default('', true) | length > 0

  post_tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          Server configuration complete!

          Installed:
          - Docker (with docker-compose plugin)
          - User 'remo' with sudo NOPASSWD access
          - User 'remo' added to docker group
          - Node.js LTS (v{{ nodejs_version }})
          - Git
          - fzf (fuzzy finder for TUI menu)
          - @devcontainers/cli
          - GitHub CLI (gh)
          - Zellij terminal multiplexer

          Login Experience:
          - Project menu auto-starts on SSH login
          - Select projects with arrow keys
          - Devcontainer projects auto-start their container
          - Non-devcontainer projects use zellij sessions

          Connect with:
            ssh remo@{{ ansible_host }}

    - name: Reboot server if required by package updates
      ansible.builtin.reboot:
        msg: "Rebooting to apply system updates"
        reboot_timeout: 300
      when: reboot_required_file.stat.exists | default(false)

    - name: Display reboot status
      ansible.builtin.debug:
        msg: "{{ 'Server was rebooted to apply system updates.' if reboot_required_file.stat.exists | default(false) else 'No reboot was required.' }}"
