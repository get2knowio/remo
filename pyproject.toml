[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "remo-cli"
version = "0.8.0rc2"
description = "Remote development environment CLI"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "InquirerPy>=0.3.4",
    "boto3",
    "hcloud",
    "ansible-core>=2.18.0,<2.19.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-mock",
    "ruff",
    "mypy",
]

[project.scripts]
remo-cli = "remo_cli.cli.main:cli"
remo = "remo_cli.cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/remo_cli"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
src = ["src"]
line-length = 100
