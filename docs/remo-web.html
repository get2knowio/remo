document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ip:content-box}\n  ::-webkit-scrollbar-thumb:hover{background:oklch(0.42 0.012 255);background-clip:content-box}\n  input{font-family:inherit}\n  @keyframes rblink{0%,49%{opacity:1}50%,100%{opacity:0}}\n  @keyframes rspin{to{transform:rotate(360deg)}}\n  @keyframes rpulse{0%,100%{opacity:1}50%{opacity:.35}}\n  @keyframes rbar{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}\n  @keyframes rpop{from{opacity:0;transform:translateY(6px) scale(.98)}to{opacity:1;transform:none}}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--accent: {{accent}}; --sp: {{sp}}; --term-font: {{termFont}}; --term-size: {{termSize}}; --term-liga: {{termLiga}}; height:100vh; display:flex; flex-direction:column; overflow:hidden; background:oklch(0.17 0.012 255); font-size:14px\">\n\n  <!-- ══ TOP BAR ══ -->\n  <header style=\"flex:none; display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding:9px 15px; border-bottom:1px solid oklch(0.27 0.012 255); background:oklch(0.195 0.012 255)\">\n    <sc-if value=\"{{ showRailToggle }}\" hint-placeholder-val=\"{{ true }}\">\n      <button sc-camel-on-click=\"{{ onToggleRail }}\" title=\"{{ railToggleTitle }}\" style=\"width:31px; height:31px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.8 0.01 255); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center\" style-hover=\"background:oklch(0.27 0.012 255)\">{{ railToggleIcon }}<\u002Fbutton>\n    <\u002Fsc-if>\n    <div style=\"display:flex; align-items:center; gap:9px\">\n      <div style=\"width:9px; height:9px; border-radius:50%; background:var(--accent,#38bdf8); box-shadow:0 0 10px var(--accent,#38bdf8)\"><\u002Fdiv>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:16px; letter-spacing:-.01em\">remo<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:oklch(0.58 0.012 255); border:1px solid oklch(0.31 0.012 255); border-radius:4px; padding:1px 5px\">web console<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1\"><\u002Fdiv>\n\n    <span title=\"Trusted LAN / tailnet only — this console grants full shell access\" style=\"font-size:13px; cursor:default; opacity:.8\">🔒<\u002Fspan>\n\n    <span style=\"display:flex; align-items:center; gap:6px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:oklch(0.62 0.01 255)\">\n      <span style=\"width:7px; height:7px; border-radius:50%; background:var(--accent,#38bdf8)\"><\u002Fspan>{{ openCountLabel }}\n    <\u002Fspan>\n\n    <div style=\"display:flex; align-items:center; gap:7px; font-size:12px; color:oklch(0.68 0.01 255)\">\n      <span style=\"width:8px; height:8px; border-radius:50%; background:{{healthColor}}; box-shadow:0 0 8px {{healthColor}}\"><\u002Fspan>\n      <span>{{healthLabel}}<\u002Fspan>\n    <\u002Fdiv>\n\n    <button sc-camel-on-click=\"{{ onRefresh }}\" style=\"display:flex; align-items:center; gap:7px; padding:6px 11px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.85 0.01 255); font-size:12.5px; font-weight:500; cursor:pointer\" style-hover=\"background:oklch(0.27 0.012 255)\">\n      <span style=\"display:inline-block; {{refreshSpin}}\">⟳<\u002Fspan> Refresh\n    <\u002Fbutton>\n\n    <div style=\"position:relative\">\n      <button sc-camel-on-click=\"{{ onToggleDiag }}\" title=\"Diagnostics &amp; demo states\" style=\"padding:6px 10px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.85 0.01 255); font-size:12.5px; cursor:pointer\" style-hover=\"background:oklch(0.27 0.012 255)\">Diagnostics ▾<\u002Fbutton>\n      <sc-if value=\"{{ showDiag }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; right:0; top:calc(100% + 6px); width:252px; z-index:60; background:oklch(0.21 0.012 255); border:1px solid oklch(0.33 0.012 255); border-radius:10px; padding:6px; box-shadow:0 18px 40px oklch(0 0 0 / .5); animation:rpop .12s ease\">\n          <div style=\"font-size:10px; text-transform:uppercase; letter-spacing:.08em; color:oklch(0.56 0.012 255); padding:6px 8px 3px\">Scenarios &amp; states<\u002Fdiv>\n          <sc-for list=\"{{ diagItems }}\" as=\"d\" hint-placeholder-count=\"7\">\n            <button sc-camel-on-click=\"{{ d.onClick }}\" style=\"width:100%; display:flex; align-items:center; gap:8px; padding:7px 8px; border:none; background:transparent; color:oklch(0.86 0.01 255); font-size:12.5px; text-align:left; border-radius:6px; cursor:pointer; font-family:inherit\" style-hover=\"background:oklch(0.27 0.012 255)\">\n              <span style=\"width:6px; height:6px; border-radius:50%; background:{{d.dot}}; flex:none\"><\u002Fspan>{{d.label}}\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <button sc-camel-on-click=\"{{ onSettings }}\" title=\"Settings\" style=\"width:31px; height:31px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.78 0.01 255); cursor:pointer; font-size:15px\" style-hover=\"background:oklch(0.27 0.012 255)\">⚙<\u002Fbutton>\n    <button sc-camel-on-click=\"{{ onShortcuts }}\" title=\"Keyboard shortcuts\" style=\"width:31px; height:31px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.75 0.01 255); cursor:pointer; font-family:'IBM Plex Mono',monospace\">?<\u002Fbutton>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ refreshing }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"flex:none; height:2px; background:oklch(0.26 0.012 255); overflow:hidden\">\n      <div style=\"width:25%; height:100%; background:var(--accent,#38bdf8); animation:rbar 1s linear infinite\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ══ BODY: RAIL + PANE ══ -->\n  <div style=\"flex:1; min-height:0; display:flex\">\n\n    <!-- ── LEFT SESSION RAIL ── -->\n    <aside style=\"flex:none; width:{{railWidth}}; display:{{railDisplay}}; flex-direction:column; border-right:1px solid oklch(0.26 0.012 255); background:oklch(0.185 0.012 255)\">\n\n      <!-- rail search / filter -->\n      <div style=\"flex:none; padding:11px 12px; border-bottom:1px solid oklch(0.25 0.012 255); display:flex; flex-direction:column; gap:9px\">\n        <div style=\"display:flex; align-items:center; gap:8px; padding:7px 10px; background:oklch(0.155 0.01 255); border:1px solid oklch(0.29 0.012 255); border-radius:8px\" style-focus-within=\"border-color:var(--accent,#38bdf8)\">\n          <span style=\"color:oklch(0.55 0.012 255); font-size:13px\">⌕<\u002Fspan>\n          <input value=\"{{ search }}\" sc-camel-on-input=\"{{ onSearch }}\" placeholder=\"Filter sessions…\" style=\"flex:1; background:transparent; border:none; outline:none; color:oklch(0.92 0.006 255); font-size:12.5px; min-width:0\">\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:6px; flex-wrap:wrap\">\n          <sc-for list=\"{{ providerChips }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ c.onClick }}\" style=\"display:flex; align-items:center; gap:5px; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; border:1px solid {{c.border}}; background:{{c.bg}}; color:{{c.fg}}\">\n              <span style=\"width:6px; height:6px; border-radius:2px; background:{{c.dot}}\"><\u002Fspan>{{c.label}}\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px\">\n          <button sc-camel-on-click=\"{{ onToggleSessionOnly }}\" style=\"flex:1; padding:4px 8px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; font-family:inherit; border:1px solid {{sessionOnlyBorder}}; background:{{sessionOnlyBg}}; color:{{sessionOnlyFg}}\">⚡ Active only<\u002Fbutton>\n          <button sc-camel-on-click=\"{{ onOpenAllAvailable }}\" title=\"Open every available session as a grid\" style=\"flex:1; padding:4px 8px; border-radius:6px; border:1px solid color-mix(in oklch, var(--accent,#38bdf8) 45%, oklch(0.3 0.012 255)); background:color-mix(in oklch, var(--accent,#38bdf8) 15%, oklch(0.2 0.012 255)); color:oklch(0.9 0.06 235); font-size:11px; font-weight:600; cursor:pointer; font-family:inherit\">⊞ Open all · {{availCount}}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- rail scroll -->\n      <div style=\"flex:1; min-height:0; overflow-y:auto; padding:8px 8px 4px\">\n\n        <sc-if value=\"{{ showLoading }}\" hint-placeholder-val=\"{{ false }}\">\n          <sc-for list=\"{{ skeletonRows }}\" as=\"s\" hint-placeholder-count=\"9\">\n            <div style=\"display:flex; align-items:center; gap:9px; padding:9px 10px; animation:rpulse 1.4s ease infinite\">\n              <div style=\"width:8px; height:8px; border-radius:2px; background:oklch(0.32 0.012 255)\"><\u002Fdiv>\n              <div style=\"height:10px; width:{{s.w}}; border-radius:5px; background:oklch(0.3 0.012 255)\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div style=\"text-align:center; margin-top:14px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:oklch(0.6 0.012 255)\"><span style=\"display:inline-block; animation:rspin 1s linear infinite\">⟳<\u002Fspan> discovering…<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"padding:28px 16px; text-align:center\">\n            <div style=\"font-size:26px; opacity:.5; margin-bottom:10px\">◍<\u002Fdiv>\n            <div style=\"font-size:13.5px; font-weight:600; margin-bottom:6px\">Empty registry<\u002Fdiv>\n            <p style=\"font-size:12px; line-height:1.55; color:oklch(0.64 0.012 255)\">No instances registered. Add one with the CLI, then refresh.<\u002Fp>\n            <code style=\"display:block; margin-top:12px; font-family:'IBM Plex Mono',monospace; font-size:11px; background:oklch(0.14 0.01 255); border:1px solid oklch(0.27 0.012 255); border-radius:7px; padding:8px 10px; color:oklch(0.8 0.06 155); text-align:left\">$ remo hetzner create<\u002Fcode>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showNoCreds }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin:12px 4px; padding:14px; border-radius:10px; background:oklch(0.21 0.03 70); border:1px solid oklch(0.4 0.08 70)\">\n            <div style=\"font-size:20px; margin-bottom:8px\">🔑<\u002Fdiv>\n            <div style=\"font-size:13px; font-weight:600; color:oklch(0.86 0.1 80); margin-bottom:5px\">No SSH credentials<\u002Fdiv>\n            <p style=\"font-size:12px; line-height:1.55; color:oklch(0.75 0.03 70); margin-bottom:10px\">Instances are registered but the service has no SSH identity to reach them.<\u002Fp>\n            <code style=\"display:block; font-family:'IBM Plex Mono',monospace; font-size:11px; background:oklch(0.14 0.01 70); border:1px solid oklch(0.3 0.05 70); border-radius:7px; padding:8px 10px; color:oklch(0.82 0.06 80)\">-v ~/.ssh:/root/.ssh:ro<\u002Fcode>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ showInstances }}\" hint-placeholder-val=\"{{ true }}\">\n          <sc-for list=\"{{ instances }}\" as=\"inst\" hint-placeholder-count=\"3\">\n            <div style=\"margin-bottom:6px\">\n              <!-- instance header -->\n              <div style=\"display:flex; align-items:center; gap:8px; padding:9px 8px 6px\">\n                <span style=\"width:9px; height:9px; border-radius:2px; background:{{inst.providerColor}}; flex:none; box-shadow:0 0 7px {{inst.providerGlow}}\"><\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:12.5px; white-space:nowrap\">{{inst.name}}<\u002Fspan>\n                <span style=\"font-size:9.5px; color:oklch(0.55 0.012 255); font-family:'IBM Plex Mono',monospace; white-space:nowrap\">{{inst.region}}<\u002Fspan>\n                <div style=\"flex:1\"><\u002Fdiv>\n                <span title=\"{{inst.statusLabel}}\" style=\"display:flex; align-items:center; gap:4px; font-size:9.5px; font-weight:500; color:{{inst.statusColor}}\"><span style=\"width:6px; height:6px; border-radius:50%; background:{{inst.statusColor}}; {{inst.statusPulse}}\"><\u002Fspan>{{inst.statusLabel}}<\u002Fspan>\n                <sc-if value=\"{{ inst.canOpenAll }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button sc-camel-on-click=\"{{ inst.onOpenAll }}\" title=\"Open all on this instance\" style=\"width:22px; height:22px; border-radius:5px; border:1px solid oklch(0.31 0.012 255); background:transparent; color:oklch(0.72 0.01 255); cursor:pointer; font-size:11px\" style-hover=\"background:oklch(0.26 0.012 255)\">⊞<\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n\n              <!-- instance error (compact) -->\n              <sc-if value=\"{{ inst.isError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin:2px 4px 6px; padding:9px 10px; border-radius:8px; background:{{inst.errBg}}; border:1px solid {{inst.errBorder}}\">\n                  <div style=\"display:flex; align-items:center; gap:7px; font-size:12px; font-weight:600; color:{{inst.errFg}}\">{{inst.errIcon}} {{inst.errTitle}}<\u002Fdiv>\n                  <div style=\"font-size:11px; line-height:1.5; color:oklch(0.7 0.012 255); margin-top:4px\">{{inst.errMsg}}<\u002Fdiv>\n                  <code style=\"display:inline-block; margin-top:7px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:oklch(0.74 0.05 80); background:oklch(0.13 0.01 255); border:1px solid oklch(0.27 0.012 255); border-radius:5px; padding:2px 7px\">{{inst.errHint}}<\u002Fcode>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ inst.isEmptyProjects }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"margin:2px 8px 6px; font-size:11px; color:oklch(0.55 0.012 255)\">Reachable, no projects in <code style=\"font-family:'IBM Plex Mono',monospace\">~/projects<\u002Fcode><\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- session rows -->\n              <sc-for list=\"{{ inst.rows }}\" as=\"p\" hint-placeholder-count=\"3\">\n                <div sc-camel-on-click=\"{{ p.onClick }}\" title=\"{{ p.tooltip }}\" style=\"position:relative; display:flex; align-items:center; gap:8px; padding:7px 9px 7px 10px; border-radius:8px; cursor:{{p.cursor}}; background:{{p.bg}}; border-left:2px solid {{p.cursorBar}}\" style-hover=\"background:{{p.hoverBg}}\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:{{p.numColor}}; width:12px; text-align:right; flex:none\">{{p.num}}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:{{p.nameColor}}; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0\">{{p.name}}<\u002Fspan>\n                  <span style=\"display:flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace; font-size:12px; flex:none\">\n                    <sc-if value=\"{{ p.gChanges }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"Uncommitted changes\" style=\"color:oklch(0.78 0.13 62)\">●<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ p.gPush }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"Commits to push\" style=\"color:oklch(0.72 0.11 12)\">⇡<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ p.gPull }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"Commits to pull\" style=\"color:oklch(0.72 0.11 12)\">⇣<\u002Fspan><\u002Fsc-if>\n                    <sc-if value=\"{{ p.gActive }}\" hint-placeholder-val=\"{{ false }}\"><span title=\"Active Zellij session\" style=\"color:oklch(0.85 0.14 92)\">⚡<\u002Fspan><\u002Fsc-if>\n                  <\u002Fspan>\n                  <sc-if value=\"{{ p.openable }}\" hint-placeholder-val=\"{{ true }}\"><button sc-camel-on-click=\"{{ p.onAdd }}\" title=\"Add to grid (⌘-click)\" style=\"flex:none; width:20px; height:20px; border-radius:5px; border:1px solid {{p.addBorder}}; background:transparent; color:{{p.addColor}}; cursor:pointer; font-size:10px\" style-hover=\"background:oklch(0.26 0.012 255)\">{{p.addGlyph}}<\u002Fbutton><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- legend -->\n      <div style=\"flex:none; padding:8px 12px; border-top:1px solid oklch(0.25 0.012 255); display:flex; align-items:center; gap:12px; flex-wrap:wrap; font-family:'IBM Plex Mono',monospace; font-size:10px; color:oklch(0.58 0.012 255)\">\n        <span><span style=\"color:oklch(0.78 0.13 62)\">●<\u002Fspan> changes<\u002Fspan>\n        <span><span style=\"color:oklch(0.72 0.11 12)\">⇡<\u002Fspan> push<\u002Fspan>\n        <span><span style=\"color:oklch(0.72 0.11 12)\">⇣<\u002Fspan> pull<\u002Fspan>\n        <span><span style=\"color:oklch(0.85 0.14 92)\">⚡<\u002Fspan> active<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- draggable divider -->\n    <sc-if value=\"{{ showDivider }}\" hint-placeholder-val=\"{{ false }}\">\n      <div sc-camel-on-pointer-down=\"{{ onRailDragStart }}\" title=\"Drag to resize the sessions panel\" style=\"flex:none; width:6px; margin:0 -3px; z-index:8; cursor:col-resize; background:transparent\" style-hover=\"background:color-mix(in oklch, var(--accent,#38bdf8) 45%, transparent)\"><\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ── RIGHT PANE ── -->\n    <main style=\"flex:1; min-width:0; display:{{paneDisplay}}; flex-direction:column; background:oklch(0.155 0.01 255)\">\n\n      <!-- narrow back bar -->\n      <sc-if value=\"{{ showBack }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:none; padding:8px 12px; border-bottom:1px solid oklch(0.26 0.012 255); background:oklch(0.185 0.012 255)\">\n          <button sc-camel-on-click=\"{{ onBack }}\" style=\"display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.82 0.01 255); font-size:12.5px; cursor:pointer; font-family:inherit\">‹ Sessions<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- empty pane -->\n      <sc-if value=\"{{ paneEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px; color:oklch(0.6 0.012 255)\">\n          <pre style=\"font-family:'IBM Plex Mono',monospace; font-size:13px; line-height:1.25; color:oklch(0.44 0.04 235); margin-bottom:18px\">   ____ ___ _ __ ___   ___\n  | __// _ \\  _ ` _ \\ / _ \\\n  | | |  __/ | | | | | (_) |\n  |_|  \\___|_| |_| |_|\\___/<\u002Fpre>\n          <div style=\"font-size:15px; font-weight:600; color:oklch(0.82 0.01 255); margin-bottom:7px\">Select a session<\u002Fdiv>\n          <p style=\"font-size:12.5px; max-width:340px; line-height:1.6; margin-bottom:4px\">Click a session on the left to open it here. <span style=\"color:oklch(0.78 0.01 255)\">⌘-click<\u002Fspan> (or <span style=\"font-family:'IBM Plex Mono',monospace\">⊞<\u002Fspan>) a second one to view them side by side.<\u002Fp>\n          <p style=\"font-size:11.5px; color:oklch(0.5 0.012 255); font-family:'IBM Plex Mono',monospace\">press 1–9 to jump · ? for shortcuts<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- SINGLE view -->\n      <sc-if value=\"{{ showSingle }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1; min-height:0; display:flex; flex-direction:column; padding:12px\">\n          <div style=\"flex:1; min-height:0; display:flex; flex-direction:column; border-radius:11px; overflow:hidden; background:oklch(0.12 0.008 255); border:1.5px solid color-mix(in oklch, var(--accent,#38bdf8) 50%, oklch(0.26 0.012 255)); box-shadow:0 0 0 3px color-mix(in oklch, var(--accent,#38bdf8) 12%, transparent)\">\n            <div style=\"flex:none; display:flex; align-items:center; gap:11px; flex-wrap:wrap; padding:10px 13px; background:oklch(0.19 0.012 255); border-bottom:1px solid oklch(0.25 0.012 255)\">\n              <span style=\"width:11px; height:11px; border-radius:3px; background:{{single.providerColor}}; box-shadow:0 0 8px {{single.providerColor}}; flex:none\"><\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:14px; font-weight:600\">{{single.projName}}<\u002Fspan>\n              <span style=\"font-size:11px; color:oklch(0.6 0.012 255); border:1px solid oklch(0.3 0.012 255); border-radius:5px; padding:1px 7px; font-family:'IBM Plex Mono',monospace\">{{single.providerLabel}} · {{single.instName}} · {{single.region}}<\u002Fspan>\n              <span style=\"display:flex; align-items:center; gap:6px; font-size:11.5px; color:{{single.stateColor}}\"><span style=\"width:7px; height:7px; border-radius:50%; background:{{single.stateColor}}; {{single.statePulse}}\"><\u002Fspan>{{single.stateLabel}}<\u002Fspan>\n              <div style=\"flex:1\"><\u002Fdiv>\n              <sc-if value=\"{{ single.canBackGrid }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ single.onBackGrid }}\" title=\"Return to the grid you came from\" style=\"padding:6px 12px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.82 0.01 255); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit\" style-hover=\"background:oklch(0.27 0.012 255)\">⊞ Back to grid<\u002Fbutton>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ single.canReconnect }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ single.onReconnect }}\" style=\"padding:6px 12px; border-radius:7px; border:1px solid color-mix(in oklch, var(--accent,#38bdf8) 45%, oklch(0.3 0.012 255)); background:color-mix(in oklch, var(--accent,#38bdf8) 15%, transparent); color:oklch(0.9 0.06 235); font-size:12px; font-weight:600; cursor:pointer; font-family:inherit\">↻ {{single.reconnectLabel}}<\u002Fbutton>\n              <\u002Fsc-if>\n              <button sc-camel-on-click=\"{{ single.onClose }}\" title=\"Close terminal — remote Zellij session stays alive\" style=\"padding:6px 11px; border-radius:7px; border:1px solid oklch(0.3 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.8 0.01 255); font-size:12px; cursor:pointer; font-family:inherit\" style-hover=\"background:oklch(0.3 0.05 25); color:oklch(0.85 0.11 25)\">Close<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"flex:1; min-height:0; position:relative\">\n              <dc-import name=\"RemoTerminal\" term=\"{{ single.data }}\" compact=\"{{ false }}\" hint-size=\"100%,100%\"><\u002Fdc-import>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- GRID view -->\n      <sc-if value=\"{{ showGrid }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1; min-height:0; display:flex; flex-direction:column; padding:12px; gap:10px\">\n          <div style=\"flex:none; display:flex; align-items:center; gap:10px; font-size:11.5px; color:oklch(0.62 0.012 255); font-family:'IBM Plex Mono',monospace\">\n            <span>grid · {{ gridCount }} terminals<\u002Fspan>\n            <span style=\"color:oklch(0.5 0.012 255)\">click a tile to focus it alone · ⌘-click rail to toggle<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"flex:1; min-height:0; display:grid; gap:10px; {{ gridTemplate }}\">\n            <sc-for list=\"{{ gridTiles }}\" as=\"tm\" hint-placeholder-count=\"4\">\n              <div sc-camel-on-click=\"{{ tm.onSelect }}\" style=\"min-height:0; display:flex; flex-direction:column; border-radius:10px; overflow:hidden; cursor:pointer; background:oklch(0.12 0.008 255); border:1.5px solid {{tm.ring}}; box-shadow:{{tm.shadow}}\">\n                <div style=\"flex:none; display:flex; align-items:center; gap:8px; padding:7px 10px; background:oklch(0.19 0.012 255); border-bottom:1px solid oklch(0.25 0.012 255)\">\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; color:oklch(0.5 0.012 255)\">{{tm.num}}<\u002Fspan>\n                  <span style=\"width:9px; height:9px; border-radius:3px; background:{{tm.providerColor}}; flex:none\"><\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:600; white-space:nowrap\">{{tm.projName}}<\u002Fspan>\n                  <span style=\"font-size:9.5px; color:oklch(0.55 0.012 255); font-family:'IBM Plex Mono',monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">{{tm.instName}}<\u002Fspan>\n                  <div style=\"flex:1\"><\u002Fdiv>\n                  <span style=\"display:flex; align-items:center; gap:4px; font-size:10px; color:{{tm.stateColor}}; white-space:nowrap\"><span style=\"width:6px; height:6px; border-radius:50%; background:{{tm.stateColor}}; {{tm.statePulse}}\"><\u002Fspan>{{tm.stateLabel}}<\u002Fspan>\n                  <button sc-camel-on-click=\"{{ tm.onClose }}\" title=\"Close terminal (keeps remote session)\" style=\"flex:none; width:22px; height:22px; border-radius:5px; border:1px solid oklch(0.3 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.78 0.01 255); cursor:pointer; font-size:10px\" style-hover=\"background:oklch(0.3 0.05 25); color:oklch(0.85 0.11 25)\">✕<\u002Fbutton>\n                <\u002Fdiv>\n                <div style=\"flex:1; min-height:0; position:relative\">\n                  <dc-import name=\"RemoTerminal\" term=\"{{ tm.data }}\" compact=\"{{ true }}\" fit=\"{{ gridFit }}\" hint-size=\"100%,100%\"><\u002Fdc-import>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- SETTINGS -->\n  <sc-if value=\"{{ showSettings }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; z-index:75; background:oklch(0.17 0.012 255); display:flex; flex-direction:column\">\n      <div style=\"flex:none; display:flex; align-items:center; gap:12px; padding:11px 16px; border-bottom:1px solid oklch(0.27 0.012 255); background:oklch(0.195 0.012 255)\">\n        <button sc-camel-on-click=\"{{ onCloseSettings }}\" style=\"display:flex; align-items:center; gap:6px; padding:6px 11px; border-radius:7px; border:1px solid oklch(0.31 0.012 255); background:oklch(0.23 0.012 255); color:oklch(0.82 0.01 255); font-size:12.5px; cursor:pointer; font-family:inherit\" style-hover=\"background:oklch(0.27 0.012 255)\">‹ Back<\u002Fbutton>\n        <span style=\"font-size:15px; font-weight:600\">Settings<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:oklch(0.5 0.012 255)\">stored in this browser<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"flex:1; min-height:0; overflow-y:auto; padding:26px 20px 60px\">\n        <div style=\"max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:30px\">\n\n          <!-- terminal font -->\n          <section>\n            <div style=\"font-size:13px; font-weight:600; margin-bottom:3px\">Terminal font<\u002Fdiv>\n            <p style=\"font-size:12.5px; color:oklch(0.62 0.012 255); margin-bottom:14px\">Applied live to every browser terminal. Monospaced fonts only.<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fill,minmax(224px,1fr)); gap:10px\">\n              <sc-for list=\"{{ fontOptions }}\" as=\"f\" hint-placeholder-count=\"5\">\n                <button sc-camel-on-click=\"{{ f.onClick }}\" style=\"text-align:left; padding:13px 14px; border-radius:10px; cursor:pointer; background:{{f.bg}}; border:1.5px solid {{f.border}}; display:flex; flex-direction:column; gap:9px; font-family:inherit\" style-hover=\"border-color:color-mix(in oklch, var(--accent,#38bdf8) 55%, oklch(0.3 0.012 255))\">\n                  <div style=\"display:flex; align-items:center; gap:8px\">\n                    <span style=\"width:13px; height:13px; border-radius:50%; border:1.5px solid {{f.dotBorder}}; background:{{f.dotBg}}; display:flex; align-items:center; justify-content:center; font-size:9px; color:oklch(0.16 0.05 235)\">{{f.check}}<\u002Fspan>\n                    <span style=\"font-size:13px; font-weight:600; color:oklch(0.92 0.006 255)\">{{f.label}}<\u002Fspan>\n                    <div style=\"flex:1\"><\u002Fdiv>\n                    <span style=\"font-size:9px; font-family:'IBM Plex Mono',monospace; color:{{f.tagColor}}; border:1px solid {{f.tagColor}}; border-radius:4px; padding:0 5px\">{{f.tag}}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-family:{{f.css}}; font-size:12.5px; line-height:1.5; color:oklch(0.8 0.01 255); background:oklch(0.12 0.008 255); border:1px solid oklch(0.25 0.012 255); border-radius:7px; padding:8px 10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis\">$ git commit -m \"==&gt; fix\"<\u002Fdiv>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- grid display -->\n          <section>\n            <div style=\"font-size:13px; font-weight:600; margin-bottom:3px\">Grid display<\u002Fdiv>\n            <p style=\"font-size:12.5px; color:oklch(0.62 0.012 255); margin-bottom:14px\">How terminals behave when several share the screen in a grid.<\u002Fp>\n            <div style=\"display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:10px\">\n              <sc-for list=\"{{ gridModes }}\" as=\"g\" hint-placeholder-count=\"2\">\n                <button sc-camel-on-click=\"{{ g.onClick }}\" style=\"text-align:left; padding:14px; border-radius:10px; cursor:pointer; font-family:inherit; display:flex; gap:12px; align-items:flex-start; background:{{g.bg}}; border:1.5px solid {{g.border}}\">\n                  <span style=\"width:15px; height:15px; margin-top:1px; border-radius:50%; flex:none; border:1.5px solid {{g.dotBorder}}; background:{{g.dotBg}}; display:flex; align-items:center; justify-content:center; font-size:9px; color:oklch(0.16 0.05 235)\">{{g.check}}<\u002Fspan>\n                  <span style=\"flex:none; width:44px; height:34px; border-radius:6px; border:1px solid oklch(0.3 0.012 255); background:oklch(0.12 0.008 255); overflow:hidden; display:flex; flex-direction:column; justify-content:center; gap:2px; padding:{{g.thumbPad}}\">\n                    <span style=\"height:2px; width:{{g.l1}}; background:oklch(0.55 0.09 200); border-radius:2px\"><\u002Fspan>\n                    <span style=\"height:2px; width:{{g.l2}}; background:oklch(0.6 0.006 255); border-radius:2px\"><\u002Fspan>\n                    <span style=\"height:2px; width:{{g.l3}}; background:oklch(0.55 0.13 92); border-radius:2px\"><\u002Fspan>\n                  <\u002Fspan>\n                  <span style=\"min-width:0\">\n                    <span style=\"display:block; font-size:12.5px; font-weight:600; color:oklch(0.92 0.006 255)\">{{g.title}}<\u002Fspan>\n                    <span style=\"display:block; font-size:11.5px; line-height:1.5; color:oklch(0.62 0.012 255); margin-top:3px\">{{g.desc}}<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- size + ligatures -->\n          <section style=\"display:flex; gap:26px; flex-wrap:wrap\">\n            <div style=\"flex:1; min-width:240px\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:9px\">\n                <span style=\"font-size:13px; font-weight:600\">Font size<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--accent,#38bdf8)\">{{ termSize }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"range\" min=\"11\" max=\"18\" step=\"1\" value=\"{{ termSizeNum }}\" sc-camel-on-input=\"{{ onSize }}\" style=\"width:100%; accent-color:var(--accent,#38bdf8)\">\n            <\u002Fdiv>\n            <div style=\"flex:1; min-width:240px\">\n              <div style=\"font-size:13px; font-weight:600; margin-bottom:9px\">Ligatures<\u002Fdiv>\n              <button sc-camel-on-click=\"{{ onToggleLiga }}\" style=\"display:flex; align-items:center; gap:9px; padding:8px 12px; border-radius:8px; cursor:pointer; font-family:inherit; font-size:12.5px; border:1px solid {{ligaBorder}}; background:{{ligaBg}}; color:{{ligaFg}}\">\n                <span style=\"width:32px; height:18px; border-radius:20px; background:{{ligaTrack}}; position:relative; flex:none\"><span style=\"position:absolute; top:2px; left:{{ligaKnob}}; width:14px; height:14px; border-radius:50%; background:oklch(0.96 0 0); transition:left .15s\"><\u002Fspan><\u002Fspan>\n                Program ligatures (→ ⇒ ≠ ✓)\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsection>\n\n          <!-- nerd fonts -->\n          <section>\n            <div style=\"font-size:13px; font-weight:600; margin-bottom:3px\">Nerd Fonts<\u002Fdiv>\n            <p style=\"font-size:12.5px; line-height:1.6; color:oklch(0.62 0.012 255); margin-bottom:14px\">Nerd Fonts are patched with thousands of extra glyphs — Powerline separators, Git, folder, and language icons your prompt and Zellij status bar expect. Browsers can't read fonts installed on the instance, so upload the patched <code style=\"font-family:'IBM Plex Mono',monospace; color:oklch(0.78 0.06 155)\">.ttf<\u002Fcode> / <code style=\"font-family:'IBM Plex Mono',monospace; color:oklch(0.78 0.06 155)\">.woff2<\u002Fcode> once — it's registered in this browser and offered as a font choice above.<\u002Fp>\n            <label style=\"display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:26px; border-radius:12px; border:1.5px dashed oklch(0.34 0.012 255); background:oklch(0.155 0.01 255); cursor:pointer; text-align:center\" style-hover=\"border-color:color-mix(in oklch, var(--accent,#38bdf8) 55%, oklch(0.34 0.012 255)); background:oklch(0.17 0.01 255)\">\n              <span style=\"font-size:22px; opacity:.7\">⭳<\u002Fspan>\n              <span style=\"font-size:12.5px; color:oklch(0.82 0.01 255); font-weight:500\">Drop a patched Nerd Font here, or click to browse<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:oklch(0.52 0.012 255)\">JetBrainsMono Nerd Font · FiraCode Nerd Font · Hack Nerd Font …<\u002Fspan>\n              <input type=\"file\" accept=\".ttf,.otf,.woff,.woff2\" style=\"display:none\">\n            <\u002Flabel>\n            <div style=\"margin-top:12px; display:flex; align-items:center; gap:10px; padding:11px 13px; border-radius:9px; background:oklch(0.12 0.008 255); border:1px solid oklch(0.25 0.012 255); font-family:'IBM Plex Mono',monospace; font-size:12px; color:oklch(0.72 0.01 255); white-space:nowrap; overflow-x:auto\">\n              <span style=\"color:oklch(0.5 0.012 255)\">prompt&nbsp;preview<\u002Fspan>\n              <span style=\"color:oklch(0.72 0.13 300)\"> main<\u002Fspan>\n              <span style=\"color:oklch(0.78 0.13 62)\"> 3<\u002Fspan>\n              <span style=\"color:oklch(0.72 0.11 12)\">⇡1<\u002Fspan>\n              <span style=\"color:oklch(0.8 0.09 200)\"> api-gateway<\u002Fspan>\n              <span style=\"color:oklch(0.85 0.14 92)\"> node v24<\u002Fspan>\n              <span style=\"color:oklch(0.55 0.012 255)\">❯<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"font-size:11px; color:oklch(0.48 0.012 255); margin-top:8px\">Boxes above will render as icons once a Nerd Font is loaded and selected.<\u002Fp>\n          <\u002Fsection>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- OFFLINE overlay -->\n  <sc-if value=\"{{ showOffline }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute; inset:0; z-index:80; background:oklch(0.13 0.01 255 / .93); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; padding:24px\">\n      <div style=\"max-width:460px; text-align:center; background:oklch(0.2 0.02 25); border:1px solid oklch(0.4 0.09 25); border-radius:16px; padding:38px 32px\">\n        <div style=\"font-size:32px; margin-bottom:12px; animation:rpulse 1.5s ease infinite\">◐<\u002Fdiv>\n        <div style=\"font-size:18px; font-weight:600; color:oklch(0.85 0.08 25); margin-bottom:8px\">Remo web service is restarting<\u002Fdiv>\n        <p style=\"font-size:13.5px; line-height:1.6; color:oklch(0.72 0.02 25); margin-bottom:20px\">The Docker service is offline. Terminals reattach to their remote Zellij sessions automatically once it returns — nothing on the instances was lost.<\u002Fp>\n        <button sc-camel-on-click=\"{{ onReconnectService }}\" style=\"padding:8px 16px; border-radius:8px; border:none; background:oklch(0.75 0.13 150); color:oklch(0.16 0.05 150); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit\">Retry connection<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- shortcuts -->\n  <sc-if value=\"{{ showShortcuts }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onShortcuts }}\" style=\"position:absolute; inset:0; z-index:70; background:oklch(0.1 0.006 255 / .6); display:flex; align-items:center; justify-content:center\">\n      <div style=\"width:390px; background:oklch(0.21 0.012 255); border:1px solid oklch(0.33 0.012 255); border-radius:14px; padding:20px; box-shadow:0 24px 60px oklch(0 0 0 / .6); animation:rpop .14s ease\">\n        <div style=\"font-size:15px; font-weight:600; margin-bottom:14px\">Keyboard shortcuts<\u002Fdiv>\n        <sc-for list=\"{{ shortcutRows }}\" as=\"k\" hint-placeholder-count=\"5\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid oklch(0.25 0.012 255)\">\n            <span style=\"font-size:12.5px; color:oklch(0.78 0.01 255)\">{{k.desc}}<\u002Fspan>\n            <kbd style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; background:oklch(0.14 0.01 255); border:1px solid oklch(0.3 0.012 255); border-radius:5px; padding:2px 8px; color:oklch(0.82 0.01 255)\">{{k.key}}<\u002Fkbd>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#38bdf8&quot;,&quot;options&quot;:[&quot;#38bdf8&quot;,&quot;#4ade80&quot;,&quot;#a78bfa&quot;,&quot;#fb923c&quot;,&quot;#e5e7eb&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;providerColors&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Theme&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;comfortable&quot;,&quot;options&quot;:[&quot;comfortable&quot;,&quot;compact&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Theme&quot;}}\">\nconst C = {\n  green:'oklch(0.8 0.15 150)', blue:'oklch(0.78 0.1 235)', dim:'oklch(0.6 0.012 255)',\n  faint:'oklch(0.5 0.012 255)', white:'oklch(0.92 0.006 255)', amber:'oklch(0.83 0.13 88)',\n  red:'oklch(0.72 0.17 25)', mag:'oklch(0.72 0.18 350)', cyan:'oklch(0.8 0.09 200)',\n};\n\nclass Component extends DCLogic {\n  state = {\n    scenario:'healthy', search:'', providerFilter:null, sessionOnly:false,\n    attached:[], visible:[], focusedId:null, prevGrid:null,\n    showShortcuts:false, showDiag:false, refreshing:false, narrow:false, railCollapsed:false, railW:320,\n    settingsOpen:false, termFontCss:\"'IBM Plex Mono', monospace\", termSizeNum:13, termLiga:true, gridFit:false,\n  };\n  onRailDragStart=(e)=>{\n    e.preventDefault();\n    const startX=e.clientX, startW=this.state.railW;\n    const move=(ev)=>{ const w=Math.min(520, Math.max(262, startW+(ev.clientX-startX))); this.setState({railW:w}); };\n    const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); document.body.style.userSelect=''; };\n    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up); document.body.style.userSelect='none';\n  };\n\n  componentDidMount(){\n    this._resize=()=>{ const n=window.innerWidth<820; if(n!==this.state.narrow) this.setState({narrow:n}); };\n    this._resize(); window.addEventListener('resize',this._resize);\n    this._key=(e)=>{\n      const tag=(e.target&&e.target.tagName)||'';\n      if(tag==='INPUT'||tag==='TEXTAREA') return;\n      if(e.key==='?'){ this.setState(s=>({showShortcuts:!s.showShortcuts})); return; }\n      if(e.key==='Escape'){ this.setState(s=>({showShortcuts:false,showDiag:false, visible:s.visible.length>1&&s.focusedId?[s.focusedId]:s.visible})); return; }\n      if(/^[1-9]$/.test(e.key)){ const t=this._flat&&this._flat[+e.key-1]; if(t){ e.metaKey||e.ctrlKey||e.shiftKey ? this.addSession(t) : this.selectOnly(t); } }\n    };\n    window.addEventListener('keydown',this._key);\n  }\n  componentWillUnmount(){ window.removeEventListener('keydown',this._key); window.removeEventListener('resize',this._resize); }\n\n  registry(scn){\n    const P=(name,o)=>({id:name,name,path:'~/projects/'+name,hasDc:true,zellij:'none',pstate:'available',changes:false,ahead:false,behind:false,...o});\n    if(scn==='partial'){\n      return [\n        {id:'prox-01',name:'prox-01',provider:'proxmox',region:'local',reachable:true,compatible:true,error:null,projects:[\n          P('api-gateway',{zellij:'active',pstate:'active',changes:true}),\n          P('web-frontend',{ahead:true}),\n          P('data-pipeline',{pstate:'removed'}),\n        ]},\n        {id:'aws-use1',name:'aws-use1',provider:'aws',region:'us-east-1',reachable:true,compatible:true,error:'ssh-auth',projects:[]},\n        {id:'hetzner-fsn',name:'hetzner-fsn',provider:'hetzner',region:'fsn1',reachable:false,compatible:true,error:'unreachable',projects:[]},\n        {id:'incus-lab',name:'incus-lab',provider:'incus',region:'local',reachable:true,compatible:false,error:'incompatible',projects:[\n          P('sensor-hub',{zellij:'active',pstate:'incompatible',changes:true}),\n          P('gateway-sim',{pstate:'incompatible'}),\n        ]},\n      ];\n    }\n    return [\n      {id:'prox-01',name:'prox-01',provider:'proxmox',region:'local',reachable:true,compatible:true,error:null,projects:[\n        P('api-gateway',{zellij:'active',pstate:'active',changes:true}),\n        P('web-frontend',{ahead:true}),\n        P('data-pipeline',{zellij:'active',pstate:'active'}),\n      ]},\n      {id:'aws-use1',name:'aws-use1',provider:'aws',region:'us-east-1',reachable:true,compatible:true,error:null,projects:[\n        P('auth-service',{zellij:'active',pstate:'active',changes:true,ahead:true}),\n        P('billing-worker',{zellij:'active',pstate:'rebuilding'}),\n        P('web-frontend',{behind:true}),\n      ]},\n      {id:'hetzner-fsn',name:'hetzner-fsn',provider:'hetzner',region:'fsn1',reachable:true,compatible:true,error:null,projects:[\n        P('ml-trainer',{zellij:'active',pstate:'active'}),\n        P('docs-site',{hasDc:false}),\n        P('edge-proxy',{changes:true,dcFail:true}),\n      ]},\n    ];\n  }\n\n  provMeta(p){\n    const on=this.props.providerColors!==false;\n    const m={aws:['AWS','oklch(0.78 0.13 70)'],hetzner:['Hetzner','oklch(0.72 0.16 25)'],\n      proxmox:['Proxmox','oklch(0.72 0.13 300)'],incus:['Incus','oklch(0.78 0.11 200)']}[p]||['?',C.dim];\n    return {label:m[0], color: on?m[1]:'oklch(0.62 0.012 255)'};\n  }\n\n  errInfo(kind){\n    return {\n      'ssh-auth':{icon:'⛔',title:'SSH auth failed',fg:'oklch(0.82 0.1 25)',msg:'Reachable but the SSH key was rejected. Verify the mounted identity is authorized on this host.',hint:'Permission denied (publickey)',bg:'oklch(0.2 0.03 25)',border:'oklch(0.38 0.08 25)'},\n      'unreachable':{icon:'⚠',title:'Unreachable',fg:'oklch(0.82 0.1 25)',msg:'No response over the tailnet. Instance may be powered off. Discovery skipped its projects.',hint:'i/o timeout',bg:'oklch(0.2 0.03 25)',border:'oklch(0.38 0.08 25)'},\n      'incompatible':{icon:'⬆',title:'Host tools out of date',fg:'oklch(0.84 0.1 80)',msg:'Older Remo host agent. Projects are read-only until updated.',hint:'remo host upgrade (0.2.1 → ≥0.3)',bg:'oklch(0.2 0.03 70)',border:'oklch(0.4 0.08 70)'},\n    }[kind];\n  }\n\n  genLines(t){\n    const flavor={\n      'api-gateway':['go run ./cmd/server',[['listening on :8080',C.green],['▸ route table loaded — 42 routes',C.dim]]],\n      'web-frontend':['pnpm dev',[['VITE v5.4.2  ready in 612 ms',C.mag],['➜  Local:   http://localhost:5173/',C.blue]]],\n      'data-pipeline':['python -m pipeline.run --stage transform',[['[transform] 1.24M rows → 981k',C.dim],['[transform] completed in 8.4s',C.green]]],\n      'auth-service':['claude \"add rate limiting to /token\"',[['● Editing src/middleware/limiter.rs',C.mag],['  +48 −3 · cargo check ✓',C.green],['⏵ agent still working — safe to disconnect',C.cyan]]],\n      'billing-worker':['npm run worker',[['[worker] connected to queue billing.jobs',C.blue],['[worker] processing 3 jobs',C.dim]]],\n      'ml-trainer':['python train.py --epochs 20',[['epoch 3/20  loss 0.412  acc 0.871',C.dim],['epoch 4/20  loss 0.388  acc 0.884',C.dim]]],\n      'docs-site':['hugo server -D',[['Web Server is available at http://localhost:1313/',C.blue],['Watching for changes...',C.dim]]],\n      'edge-proxy':['caddy run',[['{\"level\":\"info\",\"msg\":\"serving initial configuration\"}',C.dim]]],\n    }[t.projName]||['ls -la',[['total 24',C.dim],['drwxr-xr-x 6 vscode vscode 4096 .',C.dim]]];\n    const prompt='vscode ➜ '+t.path+' $';\n    const L=[['↻ reattached to zellij session «'+t.projName+'»',C.green]];\n    L.push([t.hasDc?'  devcontainer up — image '+t.projName+'-dev:latest':'  no devcontainer — shell on host',C.dim]);\n    L.push(['',C.dim]);\n    L.push([prompt+' git status',C.white]);\n    L.push([t.changes?'Changes not staged: 3 files':'nothing to commit, working tree clean',C.dim]);\n    L.push(['',C.dim]);\n    L.push([prompt+' '+flavor[0],C.white]);\n    flavor[1].forEach(x=>L.push(x));\n    return L.map(x=>({text:x[0],color:x[1]}));\n  }\n\n  // ── attach / view ──\n  startFor(t){ if(t.pstate==='rebuilding') return 'dc-starting'; if(t.dcFail) return 'dc-fail'; return 'connecting'; }\n  advance(id,st,extra={}){ this.setState(s=>({attached:s.attached.map(t=>t.id===id?{...t,state:st,...extra}:t)})); }\n  schedule(id,kind){\n    if(kind==='dc-starting'){ setTimeout(()=>this.advance(id,'connecting'),1700); setTimeout(()=>this.advance(id,'connected'),2600); }\n    else if(kind==='dc-fail'){ setTimeout(()=>this.advance(id,'failed'),2100); }\n    else setTimeout(()=>this.advance(id,'connected'),850);\n  }\n  ensure(t){ // attach if needed; returns nothing\n    if(this.state.attached.some(a=>a.id===t.id)) return;\n    const kind=this.startFor(t);\n    const term={id:t.id, meta:t, state:kind==='dc-fail'?'dc-starting':kind, lines:this.genLines(t), unread:false};\n    this.setState(s=>({attached:[...s.attached,term]}),()=>this.schedule(t.id,kind));\n  }\n  selectOnly(t){ this.ensure(t); this.setState(s=>({visible:[t.id], focusedId:t.id, prevGrid:null, attached:s.attached.map(a=>a.id===t.id?{...a,unread:false}:a)})); }\n  soloTile(t){ this.setState(s=>({ prevGrid: s.visible.length>1?s.visible:s.prevGrid, visible:[t.id], focusedId:t.id, attached:s.attached.map(a=>a.id===t.id?{...a,unread:false}:a) })); }\n  backToGrid(){ this.setState(s=>{ const g=(s.prevGrid||[]).filter(id=>s.attached.some(a=>a.id===id)); return g.length? {visible:g, focusedId:g.includes(s.focusedId)?s.focusedId:g[g.length-1], prevGrid:null} : {prevGrid:null}; }); }\n  addSession(t){\n    this.ensure(t);\n    this.setState(s=>{\n      const has=s.visible.includes(t.id);\n      const visible=has?s.visible.filter(id=>id!==t.id):[...s.visible,t.id];\n      const focusedId=has?(visible.includes(s.focusedId)?s.focusedId:visible[visible.length-1]||null):t.id;\n      return {visible, focusedId, attached:s.attached.map(a=>a.id===t.id?{...a,unread:false}:a)};\n    });\n  }\n  openMany(list){ list.forEach(t=>this.ensure(t)); this.setState({visible:list.map(t=>t.id), focusedId:list[0]&&list[0].id}); }\n  closeTerm(id){ this.setState(s=>{ const attached=s.attached.filter(t=>t.id!==id);\n    const base=(s.prevGrid&&s.prevGrid.includes(id)||s.prevGrid&&s.visible.length<=1)?s.prevGrid:s.visible;\n    const visible=(base||[]).filter(v=>v!==id && attached.some(a=>a.id===v));\n    const f=visible.includes(s.focusedId)?s.focusedId:(visible[visible.length-1]||null);\n    return {attached,visible,focusedId:f,prevGrid:null}; }); }\n  reconnect(id){ this.advance(id,'connecting',{unread:false}); setTimeout(()=>this.advance(id,'connected'),850); }\n  retry(id){ this.advance(id,'dc-starting'); setTimeout(()=>this.advance(id,'connected'),1800); }\n  simDrop=()=>{ const t=this.state.attached.find(x=>x.state==='connected'&&x.id!==this.state.focusedId)||this.state.attached.find(x=>x.state==='connected'); if(t) this.advance(t.id,'disconnected'); this.setState({showDiag:false}); };\n  setScn(scn){ this.setState({scenario:scn, showDiag:false, attached:[], visible:[], focusedId:null}); }\n  refresh=()=>{ this.setState({refreshing:true, showDiag:false}); clearTimeout(this._rf); this._rf=setTimeout(()=>this.setState({refreshing:false}),1300); };\n\n  renderVals(){\n    const s=this.state, accent=this.props.accent||'#38bdf8';\n    const sp=this.props.density==='compact'?'11px':'16px';\n    const reg=this.registry(s.scenario);\n    const q=s.search.trim().toLowerCase();\n    const nameCount={}; reg.forEach(i=>i.projects.forEach(p=>{ nameCount[p.name]=(nameCount[p.name]||0)+1; }));\n    const openable=(inst,p)=> inst.reachable && inst.compatible && !inst.error && p.pstate!=='removed' && p.pstate!=='incompatible';\n    const matchP=(inst,p)=> (!q || (p.name+' '+p.path+' '+inst.name+' '+inst.provider).toLowerCase().includes(q)) && (!s.sessionOnly || p.zellij==='active');\n    const tgt=(inst,p)=>({id:inst.id+'/'+p.id, instId:inst.id, instName:inst.name, provider:inst.provider, region:inst.region, projName:p.name, path:p.path, hasDc:p.hasDc, pstate:p.pstate, changes:p.changes, dcFail:p.dcFail});\n\n    const isOpen=id=>s.attached.some(a=>a.id===id);\n    const isVis=id=>s.visible.includes(id);\n\n    const provs=[...new Set(reg.map(i=>i.provider))];\n    const providerChips=provs.map(p=>{ const m=this.provMeta(p); const active=s.providerFilter===p;\n      return {label:m.label, dot:m.color, onClick:()=>this.setState({providerFilter:active?null:p}),\n        border:active?m.color:'oklch(0.3 0.012 255)', bg:active?'color-mix(in oklch,'+m.color+' 18%, oklch(0.2 0.012 255))':'oklch(0.2 0.012 255)', fg:active?'oklch(0.95 0.02 255)':'oklch(0.72 0.01 255)'}; });\n\n    let availCount=0; const flat=[]; const instances=[];\n    reg.forEach(inst=>{\n      if(s.providerFilter && inst.provider!==s.providerFilter) return;\n      const m=this.provMeta(inst.provider);\n      const filtered=inst.projects.filter(p=>matchP(inst,p));\n      const instMatch=!q || (inst.name+' '+inst.provider).toLowerCase().includes(q);\n      if(q && !instMatch && filtered.length===0) return;\n\n      let statusLab
